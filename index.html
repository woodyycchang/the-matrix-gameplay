<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>THE CONSTRUCT — loading program</title>
<style>
  :root{
    --white:#fbfbf9; --ink:#2a2a28; --faint:#8a8a86;
    --green:#46ff7a; --green-dim:#0d5d2c; --code-bg:#020803;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--white)}
  body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--ink)}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair;touch-action:none}
  /* HUD */
  #scene{position:fixed;top:14px;left:16px;font-size:11px;letter-spacing:.22em;color:var(--faint);
    text-transform:uppercase;pointer-events:none;mix-blend-mode:difference;color:#9a9a96}
  #aim{position:fixed;left:50%;top:56%;transform:translateX(-50%);font-size:12px;letter-spacing:.14em;
    color:var(--ink);background:rgba(251,251,249,.72);padding:3px 10px;border:1px solid rgba(42,42,40,.25);
    opacity:0;transition:opacity .15s;pointer-events:none}
  #lookhint{position:fixed;top:14px;right:16px;font-size:11px;letter-spacing:.18em;color:var(--faint);
    opacity:0;transition:opacity .3s;pointer-events:none}
  #mic{position:fixed;right:14px;bottom:64px;width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(42,42,40,.35);background:rgba(251,251,249,.8);font-size:15px;cursor:pointer;color:var(--ink)}
  #mic.live{border-color:var(--green);box-shadow:0 0 0 3px rgba(70,255,122,.25);color:#0d7a3a}
  /* console */
  #console{position:fixed;left:0;right:0;bottom:0;padding:10px 16px 12px;pointer-events:none}
  #log{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
  #log .line{font-size:12.5px;letter-spacing:.04em;color:var(--ink);text-shadow:0 0 6px rgba(251,251,249,.9);
    transition:opacity 1.2s;max-width:72ch}
  #log .line.sys{color:var(--faint)}
  #log .line.fade{opacity:0}
  #inrow{display:flex;gap:8px;align-items:center;pointer-events:auto;opacity:.55;transition:opacity .15s}
  #inrow.open{opacity:1}
  #inrow .gt{color:#0d7a3a;font-size:13px}
  #cmd{flex:1;max-width:46ch;background:rgba(251,251,249,.85);border:0;border-bottom:1px solid rgba(42,42,40,.4);
    font:inherit;font-size:13px;color:var(--ink);padding:5px 2px;outline:none;letter-spacing:.03em}
  #cmd::placeholder{color:#9a9a96}
  #chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;pointer-events:auto}
  .chip{font:inherit;font-size:11px;letter-spacing:.12em;text-transform:lowercase;color:var(--ink);
    background:transparent;border:1px solid rgba(42,42,40,.3);padding:4px 11px;cursor:pointer;border-radius:2px}
  .chip:hover{border-color:var(--ink);background:rgba(42,42,40,.05)}
  /* touch */
  #tbtns{position:fixed;right:10px;bottom:110px;display:none;flex-direction:column;gap:8px}
  body.touch #tbtns{display:flex}
  .tb{font:inherit;font-size:11px;letter-spacing:.12em;padding:11px 13px;border:1px solid rgba(42,42,40,.4);
    background:rgba(251,251,249,.78);color:var(--ink);border-radius:3px}
  /* boot */
  #boot{position:fixed;inset:0;background:var(--code-bg);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:26px;z-index:10;cursor:pointer;transition:opacity .6s}
  #boot.gone{opacity:0;pointer-events:none}
  #boot .t{color:var(--green);font-size:clamp(26px,5.4vw,52px);letter-spacing:.42em;text-indent:.42em;
    text-shadow:0 0 18px rgba(70,255,122,.45);animation:fl 3.2s infinite}
  #boot .s{color:#2f9e57;font-size:12px;letter-spacing:.3em;text-transform:uppercase}
  #go{font:inherit;font-size:13px;letter-spacing:.3em;color:var(--green);background:transparent;
    border:1px solid var(--green-dim);padding:12px 34px;cursor:pointer;border-radius:2px}
  #go:hover{border-color:var(--green);box-shadow:0 0 14px rgba(70,255,122,.25)}
  #boot .keys{color:#1f6b3c;font-size:11px;letter-spacing:.14em;line-height:2;text-align:center;max-width:60ch;padding:0 20px}
  @keyframes fl{0%,100%{opacity:1}92%{opacity:1}94%{opacity:.55}96%{opacity:1}}
  @media (prefers-reduced-motion: reduce){#boot .t{animation:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="scene">THE CONSTRUCT</div>
<div id="aim"></div>
<div id="lookhint">CLICK TO LOOK · ESC TO RELEASE</div>
<button id="mic" title="hold V to talk">&#9210;</button>

<div id="console">
  <div id="log"></div>
  <div id="inrow"><span class="gt">&gt;</span><input id="cmd" placeholder="ask for anything — ‘weapons’, ‘dojo’, ‘three chairs’…" autocomplete="off" spellcheck="false"></div>
  <div id="chips"></div>
</div>

<div id="tbtns"></div>

<div id="boot">
  <div class="t">THE CONSTRUCT</div>
  <div class="s">loading program · an original homage</div>
  <button id="go" type="button">ENTER</button>
  <div class="keys">WASD move · SHIFT sprint · SPACE jump · mouse look · C code vision<br>
  E use · click fire/strike · ENTER type a request · hold V to speak · M mute</div>
</div>

    for (var oi = 0; oi < offs.length; oi++) {
      var cx2 = pos[0] + rx * offs[oi][0] - Math.sin(yaw) * offs[oi][1];
      var cz2 = pos[2] + rz * offs[oi][0] + Math.cos(yaw) * offs[oi][1];
      var clear = true;
      for (var ci2 = 0; ci2 < insts0.length; ci2++) {
        var ex2 = insts0[ci2];
        if (ex2.kind === 'ground' || ex2.kind === 'world' || ex2.loadT <= 0) continue;
        var ddx2 = ex2.pos[0] - cx2, ddz2 = ex2.pos[2] - cz2;
        if (ddx2 * ddx2 + ddz2 * ddz2 < 0.9) { clear = false; break; }
      }
      if (clear) { pos = [cx2, pos[1], cz2]; break; }
    }
    var mesh, lbl = label || kind, k = 'prop';
    switch (kind) {
      case 'chair': mesh = P.chair(); break;
      case 'table': mesh = P.table(); break;
      case 'tv': mesh = P.tv(); break;
      case 'lamp': mesh = P.lamp(); break;
      case 'tree': mesh = P.tree(50 + ((this._burstSeed++) % 7)); break;
      case 'car': mesh = P.car('#5a6a72'); break;
      case 'crate': mesh = P.crate(); break;
      case 'booth': mesh = P.booth(); k = 'booth'; lbl = 'exit'; break;
      case 'dummy': mesh = P.dummy(); k = 'dummy'; break;
      case 'mirror': mesh = P.mirror(); this.say(L.mirror); break;
      case 'bike': mesh = P.bike(); k = 'bike'; lbl = 'motorcycle'; this.say(L.bike, 0.6); break;
      case 'katana': mesh = P.katanaStand(); k = 'katana'; lbl = 'katana'; this.say(L.katana, 0.6); break;
      case 'bench': mesh = P.bench(); break;
      case 'lamppost': mesh = P.lamppost(); break;
      case 'fountain': mesh = P.fountain(); break;
      default: mesh = P.pedestal(); k = 'pedestal'; break;
    }
    var it = C.inst(mesh, pos, yaw, { label: lbl, kind: k });
    it.loadT = 0; it.loadDir = 1; it._delay = delay || 0;

      var cy = Math.cos(yaw), sy = Math.sin(yaw);
      var hw = Math.max(Math.abs(b.max[0]), Math.abs(b.min[0])), hd = Math.max(Math.abs(b.max[2]), Math.abs(b.min[2]));
      var r = kind === 'booth' ? 0.52 : (kind === 'bike' ? 0.55 : Math.max(hw, hd) * 0.8);
      var col = { min: [pos[0] - r, pos[1], pos[2] - r], max: [pos[0] + r, pos[1] + b.max[1], pos[2] + r] };
      if (kind === 'booth') { col.max[1] = pos[1] + 2.3; it._col = col; }
      if (kind === 'bike') { col.max[1] = pos[1] + 1.1; it._col = col; }
      this.scene.colliders.push(col);

    if (kind === 'booth') { this._boothRing = true; this.emit('ring'); this.say(L.booth, 0.9); }
    if (kind === 'dummy') this.scene.dummyPos = pos.slice();

  };

  // ----- crowd -----
  Game.prototype.initCrowd = function (sc) {
    var r = C.rng(2024), peds = [];
    var lanes = [-5.4, -3.6, -1.8, 1.8, 3.6, 5.4];
    for (var i = 0; i < this.crowdMax; i++) {
      var grey = 0.28 + r() * 0.4;
      var gs = C.rgb2hex(grey * 255, grey * 255, grey * 258 > 255 ? 255 : grey * 258);
      var sk = r();
      // render-tier mix: most pedestrians are low/mid budget, a few are full detail.
      // in a simulated world, background extras don't get rendered at full fidelity.
      var roll = r(), tier = roll < 0.45 ? 'terminal' : (roll < 0.8 ? 'retail' : 'custom');
      var mesh = P.human({ tier: tier, suit: gs, skin: C.rgb2hex(170 + sk * 44, 162 + sk * 40, 152 + sk * 36), hair: r() < 0.5 ? '#2c2c2e' : '#55504a', shirt: r() < 0.4 ? '#dddbd4' : null, seed: 300 + i });
      var dir = r() < 0.5 ? 1 : -1;
      var it = C.inst(mesh, [-44 + r() * 88, 0, lanes[(i % lanes.length)] + (r() - 0.5) * 0.7], dir > 0 ? Math.PI / 2 : -Math.PI / 2, { kind: 'ped', label: 'pedestrian' });
      it.pose = [0, 0, 0, 0, 0, 0];
      sc.insts.push(it);
      peds.push({ it: it, dir: dir, speed: 1.15 + r() * 0.55, ph: r() * 6.28 });
    }
    this.crowd = { peds: peds, red: null, agent: null };
    var self = this;
    sc.update = function (game, dt) { self.updateCrowd(dt); };
  };

  Game.prototype.updateCrowd = function (dt) {
    var cw = this.crowd; if (!cw) return;
    if (this.state === 'frozen') return;
    var p = this.player.pos;
    for (var i = 0; i < cw.peds.length; i++) {
      var pd = cw.peds[i], it = pd.it;
      if (it.loadT < 1) continue;
      it.pos[0] += pd.dir * pd.speed * dt;
      pd.ph += pd.speed * dt * 3.4;
      var dx = it.pos[0] - p[0], dz = it.pos[2] - p[2];
      var d2 = dx * dx + dz * dz;
      if (d2 < 2.1 && d2 > 0.0001) {
        it.pos[2] += (dz >= 0 ? 1 : -1) * dt * 1.6;
      }
      if (it.pos[0] > 47) { it.pos[0] = -47; }
      if (it.pos[0] < -47) { it.pos[0] = 47; }
      var s = Math.sin(pd.ph);
      it.pose[1] = s * 0.5; it.pose[2] = -s * 0.5;
      it.pose[3] = -s * 0.38; it.pose[4] = s * 0.38;
      it.pos[1] = Math.abs(Math.cos(pd.ph)) * 0.035;
    }
    // red dress walker
    if (!this.flags.lessonDone) {
      if (!cw.red) {
        this._redTimer -= dt;
        if (this._redTimer <= 0) this.spawnRed();
      } else {
        var rd = cw.red, rit = rd.it;
        rit.pos[0] += rd.dir * 1.12 * dt;
        rd.ph += 3.4 * dt;
        var s2 = Math.sin(rd.ph);
        rit.pose[1] = s2 * 0.42; rit.pose[2] = -s2 * 0.42;
        rit.pose[3] = -s2 * 0.3; rit.pose[4] = s2 * 0.3;
        rit.pos[1] = Math.abs(Math.cos(rd.ph)) * 0.03;
        var bx = rit.pos[0] - p[0];
        if ((rd.dir > 0 && bx > 16) || (rd.dir < 0 && bx < -16)) { this.removeRed(); this._redTimer = 16; }
        // gaze dwell
        var fw = fwdOf(this.player.yaw, this.player.pitch);
        var to = [rit.pos[0] - this.cam.pos[0], rit.pos[1] + 1.2 - this.cam.pos[1], rit.pos[2] - this.cam.pos[2]];
        var dist = C.len(to);
        if (dist < 25) {
          var ang = Math.acos(C.clamp(C.dot(C.norm(to), fw), -1, 1));

      }
    }
  };

  Game.prototype.spawnRed = function () {
    var p = this.player, fw = fwdOf(p.yaw, 0);
    var sgn = fw[0] >= 0 ? 1 : -1;
    var mesh = P.redDress();
    var it = C.inst(mesh, [p.pos[0] + sgn * 20, 0, C.clamp(p.pos[2] + 1.2, -5.4, 5.4)], sgn > 0 ? -Math.PI / 2 : Math.PI / 2, { kind: 'red', label: 'her' });
    it.pose = [0, 0, 0, 0, 0, 0];
    it.loadT = 1;
    this.scene.insts.push(it);
    this.crowd.red = { it: it, dir: -sgn, ph: 0 };
  };
  Game.prototype.removeRed = function () {
    var cw = this.crowd; if (!cw || !cw.red) return;
    var idx = this.scene.insts.indexOf(cw.red.it);
    if (idx >= 0) this.scene.insts.splice(idx, 1);
    cw.red = null; this._dwell = 0;
  };

  Game.prototype.freezeLesson = function () {
    this.state = 'frozen'; this._frozenT = 0;
    this.fx.stamp = 'TRAINING PROGRAM \u2014 PAUSED'; this.fx.stampA = 1;
    this.emit('freeze');
    // nearest pedestrian turns
    var cw = this.crowd, p = this.player.pos, best = null, bd = 1e9;
    for (var i = 0; i < cw.peds.length; i++) {
      var it = cw.peds[i].it;
      var dx = it.pos[0] - p[0], dz = it.pos[2] - p[2], d2 = dx * dx + dz * dz;
      if (d2 < bd) { bd = d2; best = cw.peds[i]; }
    }
    if (best) {
      best.it.mesh = P.agent();
      best.it._wv = null;
      best.it.pose = [0, 0, 0, 0, 0, 0];
      best.it.yaw = Math.atan2(p[0] - best.it.pos[0], p[2] - best.it.pos[2]);
      best.it.label = 'agent';
      cw.agent = best;
    }
  };
  Game.prototype.resumeLesson = function () {
    this.state = 'play';
    this.flags.lessonDone = true;
    this.fx.stampA = 0; this.fx.stamp = null;
    this.removeRed();
    this.emit('resume');
    this.say(L.lesson, 0.4);
  };

  // ----- rooftop fall / hurt -----
  Game.prototype.genCracks = function () {
    var r = C.rng(77 + this.flags.attempts), segs = [];
    for (var i = 0; i < 9; i++) {
      var a = (i / 9) * C.TAU + (r() - 0.5) * 0.5;
      var x = 0, y = 0, len = 0.1 + r() * 0.1;
      for (var s = 0; s < 4; s++) {
        var a2 = a + (r() - 0.5) * 0.7;
        var nx = x + Math.cos(a2) * len, ny = y + Math.sin(a2) * len;
        segs.push([x, y, nx, ny]);
        x = nx; y = ny; len *= 1.35;
      }
    }
    return segs;
  };

  Game.prototype.impactStreet = function () {
    this._fallFromRoof = false;
    this.fx.slowTarget = 1; this.fx.slowmo = 1;
    if (!this.flags.firstFallDone) {
      this.flags.firstFallDone = true;
      this.state = 'down'; this._downT = 0; this._postRise = -1;
      this.fx.cracks = this.genCracks(); this.fx.crackA = 1;
      this.fx.vig = 1; this.fx.heart = 0;
      this.emit('impactBig');
      this.say(L.fall1, 1.4);
      this.say(L.fall2, 4.2);
    } else {
      this.emit('impactSmall');
      this.fx.flash = 1; this.fx.flashCol = '#ffffff';
      this.fx.vig = 0.45;
      this.say(L.again, 0.3);
      this.respawnRoof();
    }
  };

  Game.prototype.respawnRoof = function () {
    var R = C.ROOF, p = this.player;
    p.pos = R.spawn.slice(); p.vel = [0, 0, 0];
    p.yaw = Math.PI / 2; p.pitch = 0; p.grounded = true;
    this.state = 'play';
    this._airFromA = false;
    this.flags.successDone = false;
  };

  // ----- interaction -----
  Game.prototype.updateAim = function () {
    if (this.bike) { this.aim = null; return; }
    var eye = this.cam.pos, fw = fwdOf(this.player.yaw, this.player.pitch);
    this.aim = null;
    var insts = this.scene.insts, best = null, bd = 1e9;
    for (var i = 0; i < insts.length; i++) {
      var it = insts[i];
      if (it.loadT < 0.9) continue;
      if (it.kind !== 'gun' && it.kind !== 'dummy' && it.kind !== 'booth' && it.kind !== 'bike' && it.kind !== 'katana') continue;
      var cy = it.kind === 'gun' ? 0.05 : (it.kind === 'katana' ? 0.35 : (it.kind === 'bike' ? 0.6 : 1.1));
      var to = [it.pos[0] - eye[0], it.pos[1] + cy - eye[1], it.pos[2] - eye[2]];
      var d = C.len(to);
      var maxd = it.kind === 'dummy' ? 2.1 : (it.kind === 'booth' ? 2.4 : (it.kind === 'bike' ? 3.0 : (it.kind === 'katana' ? 2.4 : 2.8)));
      if (d > maxd) continue;
      var ang = Math.acos(C.clamp(C.dot(C.norm(to), fw), -1, 1));
      if (ang > 0.5) continue;
      if (d < bd) { bd = d; best = it; }
    }
    this.aim = best;
  };

  Game.prototype.doAction = function () {
    if (this.bike) { this.dismountBike(); return; }
    var it = this.aim;
    if (!it) return;
    if (it.kind === 'gun') {
      it.loadDir = -1;
      this.held = { mesh: P.heldGun(), kick: 0, bob: 0, kind: it.gun || 'pistol' };
      this.emit('pickup');
      this.say(L.gun);
    } else if (it.kind === 'booth') {
      this.enterBooth();
    } else if (it.kind === 'bike') {
      this.mountBike(it);
    } else if (it.kind === 'katana') {
      it.loadDir = -1;
      if (it._col) { var ci = this.scene.colliders.indexOf(it._col); if (ci >= 0) this.scene.colliders.splice(ci, 1); it._col = null; }
      this.held = { mesh: P.heldKatana(), kick: 0, bob: 0, kind: 'katana' };
      this.emit('pickupBlade');
    }
  };

  Game.prototype.enterBooth = function () {
    this._boothRing = false;
    this.emit('ringStop'); this.emit('exitFlash');
    this.fx.flash = 1; this.fx.flashCol = '#ffffff';
    this.transition('void', L.hangup);
  };

  Game.prototype.doFire = function () {
    var t = this.time;
    if (this.bike) return; // hands on the bars
    if (this.held && this.held.kind === 'katana') { this.doSlash(); return; }
    if (this.held) {
      this.held.kick = 1;
      this.emit('shot');
      var eye = this.cam.pos, fw = fwdOf(this.player.yaw, this.player.pitch);
      var hit = null, bt = 60;
      var cols = this.scene.colliders;
      for (var i = 0; i < cols.length; i++) {
        var th = rayBox(eye, fw, cols[i], bt);
        if (th > 0 && th < bt) { bt = th; hit = th; }
      }
      // ground plane
      if (fw[1] < -0.001) {
        var tg = (this.scene.groundY - eye[1]) / fw[1];
        if (tg > 0.01 && tg < bt) { bt = tg; hit = tg; }
      }
      if (hit != null) this.burst([eye[0] + fw[0] * bt, eye[1] + fw[1] * bt, eye[2] + fw[2] * bt], 14);
    } else if (this.aim && this.aim.kind === 'dummy') {
      this.emit('punch');
      var it = this.aim;
      it._wob = 1; it._baseYaw = it._baseYaw == null ? it.yaw : it._baseYaw;
      this.burst([it.pos[0], it.pos[1] + 1.25, it.pos[2]], 7);
    } else {
      this.emit('swish');
    }
  };

  Game.prototype.burst = function (p, n) {
    var r = C.rng(this._burstSeed++ * 97 + 3);
    var parts = [];
    for (var i = 0; i < n; i++) {
      var a = r() * C.TAU, e = (r() - 0.3) * 2.4, sp = 1.2 + r() * 2.4;
      parts.push({ x: p[0], y: p[1], z: p[2], vx: Math.cos(a) * sp * Math.cos(e), vy: Math.sin(e) * sp + 0.8, vz: Math.sin(a) * sp * Math.cos(e), s: (r() * 1e9) | 0 });
    }
    this.fx.bursts.push({ p: parts, t0: this.time, life: 0.65 });
    if (this.fx.bursts.length > 10) this.fx.bursts.shift();
  };

  // ----- physics -----
  var GRAV = 18, WALK = 4.2, SPRINT = 8.0, R = 0.35, H = 1.7, EYE = 1.62;
  C.PHYS = { GRAV: GRAV, WALK: WALK, SPRINT: SPRINT, JUMP0: 5.0, JUMPK: 0.55, COYOTE: 0.12 };
  // Bike feel ported from the author's STREET PROTOCOL CFG, rescaled for the Construct's tighter world.
  // (Street ran a 3 km street at 64 m/s; here the envelope is smaller but keeps the same character:
  //  heavy roll-on, real steering, a turbo that clearly bites, walls you can clip.)
  C.BIKE = { MAX: 22, BOOST: 34, ACCEL: 12, BRAKE: 26, COAST: 3.2, STEER: 2.0, TURBO_STEER: 1.2, EYE: 1.34 };

  Game.prototype.mountBike = function (it) {
    this.bike = { it: it, speed: 0, lean: 0 };
    it.loadDir = 0;
    if (it._col) { var ci = this.scene.colliders.indexOf(it._col); if (ci >= 0) this.scene.colliders.splice(ci, 1); it._col = null; }
    this.held = null;
    var p = this.player;
    p.pos = it.pos.slice(); p.vel = [0, 0, 0]; p.grounded = true;
    p.yaw = it.yaw; // bike nose is +z at yaw=0, same as player forward
    this.emit('mount');
    this.say(L.bike, 0.2);
  };
  Game.prototype.dismountBike = function () {
    if (!this.bike) return;
    var bk = this.bike, p = this.player;
    var it = bk.it;
    it.pos = [p.pos[0], this.scene.groundY, p.pos[2]];
    it.yaw = p.yaw; it._baseYaw = null; it._wob = 0;
    // step the rider off to the left of the bike
    var lx = Math.cos(p.yaw), lz = Math.sin(p.yaw);
    p.pos = [p.pos[0] - lx * 0.9, this.scene.groundY, p.pos[2] - lz * 0.9];
    p.vel = [0, 0, 0];
    // re-arm the bike collider so it's solid again once parked
    var r = 0.55, col = { min: [it.pos[0] - r, it.pos[1], it.pos[2] - r], max: [it.pos[0] + r, it.pos[1] + 1.1, it.pos[2] + r] };
    it._col = col; this.scene.colliders.push(col);
    this.bike = null;
    this.emit('dismount');
  };

  Game.prototype.moveBike = function (input, dt) {
    var p = this.player, sc = this.scene, cols = sc.colliders, B = C.BIKE, bk = this.bike;
    // look (pitch only via mouse; yaw is driven by steering for the body, but let mouse nudge view)
    p.pitch = C.clamp(p.pitch + (input.dpitch || 0), -1.0, 1.0);
    var turbo = !!input.sprint;
    var throttle = (input.fwd || 0);
    var steerIn = (input.strafe || 0) + (input.dyaw || 0) * 26; // mouse contributes to steering
    // steering scales down with speed (twitchy when slow, stable when fast), turbo widens line
    var speedFrac = bk.speed / B.BOOST;
    var steerRate = (turbo ? B.TURBO_STEER : B.STEER) * (1 - 0.55 * C.clamp(speedFrac, 0, 1));
    p.yaw += steerIn * steerRate * dt;
    bk.lean += (C.clamp(steerIn, -1, 1) * Math.min(1, bk.speed / B.MAX) - bk.lean) * Math.min(1, 6 * dt);
    // longitudinal
    var maxv = turbo ? B.BOOST : B.MAX;
    if (throttle > 0.01) bk.speed += B.ACCEL * throttle * dt;
    else if (throttle < -0.01) bk.speed += B.BRAKE * throttle * dt; // brake/reverse
    else bk.speed -= Math.sign(bk.speed) * Math.min(Math.abs(bk.speed), B.COAST * dt);
    bk.speed = C.clamp(bk.speed, -B.MAX * 0.3, maxv);
    // integrate along facing (nose +z at yaw 0)
    var dirx = Math.sin(p.yaw), dirz = -Math.cos(p.yaw);
    var step = bk.speed * dt;
    // substep to avoid tunnelling at high speed (|step| can exceed collider half-widths)
    var subs = Math.max(1, Math.ceil(Math.abs(step) / 0.4));
    var ds = step / subs;
    function blocked(nx, nz) {
      for (var i = 0; i < cols.length; i++) {
        var b = cols[i];
        if (b.max[1] <= p.pos[1] + 0.2) continue;
        if (b.min[1] >= p.pos[1] + 1.0) continue;
        if (nx > b.min[0] - 0.5 && nx < b.max[0] + 0.5 && nz > b.min[2] - 0.5 && nz < b.max[2] + 0.5) return b;
      }
      return null;
    }
    for (var sgi = 0; sgi < subs; sgi++) {
      var nx = p.pos[0] + dirx * ds, nz = p.pos[2] + dirz * ds;
      if (blocked(nx, p.pos[2])) { p.pos[0] += 0; bk.speed *= 0.4; this.emit('scrape'); }
      else p.pos[0] = nx;
      if (blocked(p.pos[0], nz)) { bk.speed *= 0.4; this.emit('scrape'); }
      else p.pos[2] = nz;
    }
    p.pos[1] = sc.groundY;
    p.vel = [dirx * bk.speed, 0, dirz * bk.speed];
    // sync the bike instance: push it forward so the rider sits on the seat and the
    // tank + bars + headlamp fill the lower view (otherwise the bike renders under the camera and the frame looks empty)
    var it = bk.it;
    var fx0 = Math.sin(p.yaw) * 0.55, fz0 = -Math.cos(p.yaw) * 0.55;
    it.pos = [p.pos[0] + fx0, sc.groundY, p.pos[2] + fz0];
    it.yaw = p.yaw;
    it._wob = 0;
    bk.it._lean = bk.lean;
    this.emit('engine', { speed: Math.abs(bk.speed), throttle: Math.max(0, throttle) });
    // footstep phase off; engine carries the motion
    p.phase = 0; p.grounded = true; p.coyote = C.PHYS.COYOTE;
  };

  Game.prototype.doSlash = function () {
    if (!this.held) return;
    this.held.kick = 1;
    this.emit('slash');
    var B = C.BIKE; // reuse no constants; slash spec below ported from STREET PROTOCOL
    var range = 3.5, arc = 1.35; // slashRange / slashArc (radians half-angle)
    var eye = this.cam.pos, fw = fwdOf(this.player.yaw, this.player.pitch);
    var insts = this.scene.insts, struck = false;
    for (var i = 0; i < insts.length; i++) {
      var it = insts[i];
      if (it.loadT < 0.5) continue;
      if (it.kind !== 'dummy' && it.kind !== 'ped' && it.kind !== 'red') continue;
      var to = [it.pos[0] - eye[0], (it.pos[1] + 1.1) - eye[1], it.pos[2] - eye[2]];
      var d = C.len(to);
      if (d > range) continue;
      var ang = Math.acos(C.clamp(C.dot(C.norm(to), fw), -1, 1));
      if (ang > arc) continue;

          'font:13px/1.7 ui-monospace,Menlo,Consolas,monospace;display:flex;flex-direction:column;' +
          'align-items:center;justify-content:center;text-align:center;padding:24px;letter-spacing:.04em';
        document.body.appendChild(d);
      }
      d.innerHTML = '<div style="color:#46ff7a;letter-spacing:.3em;margin-bottom:14px">CONSTRUCT FAULT</div>' +
        '<div style="max-width:70ch;opacity:.85">' + String(msg).replace(/[<>&]/g, ' ') + '</div>' +
        '<div style="margin-top:18px;opacity:.5">reload the page to recompile</div>';
      d.style.display = 'flex';
    } catch (e) {}
  }

  // ---------- boot ----------
  function start() {
    if (started) return;
    started = true;
    hud.boot.classList.add('gone');
    setTimeout(function () { hud.boot.style.display = 'none'; }, 700);
    A.init();
    A.setAmbience('void');
    if (!touch.active) tryLock();
    if (window.speechSynthesis) try { window.speechSynthesis.getVoices(); } catch (e) {}
  }

  function chip(label, req) {
    var b = document.createElement('button');
    b.className = 'chip'; b.type = 'button'; b.textContent = label;
    b.addEventListener('click', function (ev) {
      ev.stopPropagation();
      say('you: ' + (req || label), true);
      game.request(req || label);
      A.handle('chirp');
    });
    return b;
  }

  function init() {
    canvas = document.getElementById('c');
    ctx = canvas.getContext('2d');
    game = new C.Game();
    G.GAME = game;
    hud.boot = document.getElementById('boot');
    hud.scene = document.getElementById('scene');
    hud.aim = document.getElementById('aim');
    hud.log = document.getElementById('log');
    hud.inRow = document.getElementById('inrow');
    hud.input = document.getElementById('cmd');
    hud.chips = document.getElementById('chips');
    hud.hint = document.getElementById('lookhint');
    hud.mic = document.getElementById('mic');

    var defs = [['weapons', 'weapons'], ['dojo', 'dojo'], ['rooftop jump', 'rooftop'], ['motorcycle', 'motorcycle'], ['katana', 'katana'], ['city street', 'city street'], ['neon mile', 'neon'], ['a chair', 'a chair'], ['clear', 'clear']];
    for (var i = 0; i < defs.length; i++) hud.chips.appendChild(chip(defs[i][0], defs[i][1]));

    window.addEventListener('keydown', function (e) {
      if (consoleOpen) {
        if (e.key === 'Enter') { submitConsole(); e.preventDefault(); }
        else if (e.key === 'Escape') closeConsole();
        return;
      }
      if ([' ', 'arrowup', 'arrowdown'].indexOf(e.key.toLowerCase()) >= 0) e.preventDefault();
      key(e, true);
    });
    window.addEventListener('keyup', function (e) { if (!consoleOpen) key(e, false); });
    window.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mouseup', function () { dragging = false; });
    document.addEventListener('pointerlockchange', onLockChange);
    window.addEventListener('resize', resize);
    bindTouch();

    hud.mic.addEventListener('click', function () { if (!listening) startListen(); else stopListen(); });
    if (!speechAvailable()) hud.mic.style.display = 'none';
    document.getElementById('go').addEventListener('click', start);
    hud.boot.addEventListener('click', start);

    // touch buttons
    var tb = document.getElementById('tbtns');
    function tbtn(label, fn, hold) {
      var b = document.createElement('button'); b.className = 'tb'; b.textContent = label;
      b.addEventListener('touchstart', function (e) { e.preventDefault(); e.stopPropagation(); fn(true); }, { passive: false });
      if (hold) b.addEventListener('touchend', function (e) { e.preventDefault(); fn(false); });
      tb.appendChild(b);
    }
    tbtn('JUMP', function () { touch.jumpEdge = true; });
    tbtn('USE', function () { touch.actEdge = true; });
    tbtn('FIRE', function () { touch.fireEdge = true; });
    tbtn('RUN', function (d) { touch.sprint = d; }, true);
    tbtn('CODE', function () { game.toggleCode(); });
    tbtn('ASK', function () { openConsole(); });

    resize();
    // engineering hardening: auto-pause on blur/hidden, resume on click; surface runtime errors
    window.addEventListener('blur', function () { if (started) setPaused(true); });
    document.addEventListener('visibilitychange', function () { if (document.hidden && started) setPaused(true); });
    window.addEventListener('error', function (ev) { showError(ev.message || 'unknown error'); });
    window.addEventListener('unhandledrejection', function (ev) { showError((ev.reason && ev.reason.message) || 'promise rejection'); });
    requestAnimationFrame(frame);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})(typeof globalThis !== 'undefined' ? globalThis : this);

</script>
</body>
</html>
