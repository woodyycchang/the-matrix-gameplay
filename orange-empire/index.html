    UI.letterbox(true);
    QUEST.checkObjectives();
    dlog('ending:start');
  }

  const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _q = new THREE.Quaternion(), _m4 = new THREE.Matrix4();
  function stepEnding(dt) {
    E.t += dt;

    if (E.car && G.car) {
      G.car.v = E.v0 * G.endingSlow;
      const fwd = { x: Math.sin(G.car.th), z: Math.cos(G.car.th) };
      G.car.x += fwd.x * G.car.v * dt; G.car.z += fwd.z * G.car.v * dt;
      G.car.pose();
      if (AUDIO.setEngine) AUDIO.setEngine(G.endingSlow * 0.4, Math.abs(G.car.v));
    }
    // cinematic camera: pull back and face the wall
    const base = E.car && G.car ? _v1.set(G.car.x, terrainH(G.car.x, G.car.z) + 1.4, G.car.z) : _v1.set(G.player.x, terrainH(G.player.x, G.player.z) + CFG.EYE, G.player.z);
    const od = Math.max(1e-4, Math.sqrt(base.x * base.x + base.z * base.z));
    const ox = base.x / od, oz = base.z / od;
    const k = ss(0, 7, E.t);
    const rise = 2.6 + E.t * 0.22;
    _v2.set(base.x - ox * (7 + E.t * 0.25), base.y + rise * k, base.z - oz * (7 + E.t * 0.25));
    refs.camera.position.lerpVectors(E.camFrom.pos, _v2, k);
    const wallPt = { x: ox * CFG.D_WALL, y: 26 + 14 * k, z: oz * CFG.D_WALL };
    _m4.lookAt(refs.camera.position, _v2.set(wallPt.x, wallPt.y, wallPt.z), _v1.set(0, 1, 0));
    _q.setFromRotationMatrix(_m4);
    refs.camera.quaternion.copy(E.camFrom.quat).slerp(_q, k);
    // typed monologue
    const idx = Math.floor((E.t - LINE_T0) / LINE_DUR);
    if (idx >= 0 && idx < LINES.length && idx !== E.lineIdx) {
      E.lineIdx = idx; UI.endingLine(LINES[idx]);
    }
    if (idx >= LINES.length && !E.done) {
      E.done = true;
      UI.endingLine('');
      setTimeoutish(() => showTerminal(), 1.4);
    }
  }
  // tiny scheduler that works headless (driven by update)
  const timers = [];
  function setTimeoutish(fn, sec) { timers.push({ fn, at: E.t + sec }); }
  function pumpTimers() { for (let i = timers.length - 1; i >= 0; i--) { if (E.t >= timers[i].at) { const f = timers[i].fn; timers.splice(i, 1); f(); } } }

  const TERMINAL_TEXT = [
    'MERIDIAN CIVIC SYSTEMS',
    'UNIT 03 \u2014 \u201cANGEL CITY\u201d',
    '',
    'CYCLE 14,022 \u00b7 STATUS: NOMINAL',
    'SUBJECT V-1937-0042 (VOSS, H.) AT WORLD BOUNDARY',
    'CONTINUITY BREACH: NONE \u00b7 MEMORY POLICY: RETAIN',
    '',
    'SELECT:',
  ].join('\n');

  function showTerminal() {
    G.state = 'TERMINAL';
    UI.showTerminal(TERMINAL_TEXT, ['RETURN TO LOOP', 'END SESSION']);
    dlog('terminal:show');
  }

  function choose(which) {
    if (G.state !== 'TERMINAL') return;
    if (which === 'loop' || which === 0) {
      UI.hideTerminal();
      UI.fade(() => {
        FLAGS.returned = true;
        G.dayMin = CFG.START_MIN; G.gameMin = CFG.START_MIN;
        const P = G.player; P.x = -4; P.z = -3.4; P.yaw = Math.PI / 2; P.pitch = 0;
        G.inCar = false; G.inside = null;
        if (G.car) {
          G.car.v = 0; G.car.x = 10; G.car.z = -4.2; G.car.th = Math.PI / 2;
          G.car.setLights(false); G.car.pose();
        }
        G.endingSlow = 1; G.camSnap = true;
        UI.letterbox(false); UI.endingLine('');
        G.state = 'PLAY';
        QUEST.checkObjectives();
        UI.toast('7:24 PM. Friday, June 11th, 1937.');
        if (AUDIO.loopReturn) AUDIO.loopReturn();
        dlog('ending:loop');
      });
    } else {
      G.state = 'CREDITS';
      UI.showCredits();
      dlog('ending:end');
    }
  }

  function postUpdate() { if (G.state === 'ENDING') pumpTimers(); }

  return { init, update, postUpdate, startEnding, choose, nightF, duskF, LINES, TERMINAL_TEXT };
})();

// ============ 13 audio — all sound synthesized, nothing sampled ============
const AUDIO = (() => {
  const A = { ctx: null, on: false, master: null, noiseBuf: null,
    bar: null, radio: null, amb: null, eng: null,
    station: 0, stations: ['OFF', 'KGFJ \u2014 SWING', 'STATIC', '??? \u2014 1490kc'],
    numbersHeld: 0, duck: 1 };
  const headless = ENV.headless;
  const mf = (n) => 440 * Math.pow(2, (n - 69) / 12);

  function unlock() {
    if (headless || A.on) return;
    try {
      const AC = WIN.AudioContext || WIN.webkitAudioContext;
      if (!AC) return;
      A.ctx = new AC();
      const c = A.ctx;
      A.master = c.createGain(); A.master.gain.value = G.muted ? 0 : 0.8; A.master.connect(c.destination);
      // shared noise buffer
      const len = c.sampleRate * 2; const buf = c.createBuffer(1, len, c.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      A.noiseBuf = buf;
      buildAmbience(); buildEngine(); buildBarJazz(); buildRadio();
      A.on = true;
      dlog('audio:on');
    } catch (e) { dlog('audio:fail'); }
  }
  function setMuted(m) { G.muted = m; if (A.master) A.master.gain.setTargetAtTime(m ? 0 : 0.8, A.ctx.currentTime, 0.05); }

  function noiseSrc(out, { f0 = 1000, q = 1, type = 'bandpass', gain = 1, dur = 0.1, when = 0, a = 0.006 } = {}) {
    const c = A.ctx, t = c.currentTime + when;
    const src = c.createBufferSource(); src.buffer = A.noiseBuf; src.loop = true;
    const fl = c.createBiquadFilter(); fl.type = type; fl.frequency.value = f0; fl.Q.value = q;
    const atk = Math.min(a, dur * 0.35);
    const g = c.createGain(); g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(gain, t + atk);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(fl).connect(g).connect(out); src.start(t); src.stop(t + dur + 0.05);
  }
  function blip(out, { f = 440, type = 'sine', gain = 0.2, a = 0.005, dur = 0.12, when = 0, glide = 0 } = {}) {
    const c = A.ctx, t = c.currentTime + when;
    const o = c.createOscillator(); o.type = type; o.frequency.setValueAtTime(f, t);
    if (glide) o.frequency.exponentialRampToValueAtTime(Math.max(20, f + glide), t + dur);
    const g = c.createGain(); g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(gain, t + a); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(out); o.start(t); o.stop(t + dur + 0.05);
  }

  // ---------------- generative swing combo ----------------
  // F blues, 8 bars, 152 bpm. Bar 7 (index 6) carries the skip.
  function makeJazz(out, { transpose = 0, level = 1 } = {}) {
    const c = A.ctx;
    const bus = c.createGain(); bus.gain.value = level;
    const tone = c.createBiquadFilter(); tone.type = 'lowpass'; tone.frequency.value = 5200;
    bus.connect(tone).connect(out);
    const BEAT = 60 / 152, BAR = BEAT * 4, LOOP = BAR * 8;
    const CH = [ // [bass roots per beat (midi)], [comp chord midi notes]
      { b: [41, 45, 48, 47], ch: [57, 60, 63] },  // F7
      { b: [41, 43, 45, 46], ch: [57, 60, 63] },  // F7 walk up
      { b: [46, 50, 53, 51], ch: [58, 62, 65] },  // Bb7
      { b: [41, 45, 48, 45], ch: [57, 60, 63] },  // F7
      { b: [48, 52, 55, 53], ch: [58, 60, 64] },  // C7
      { b: [46, 50, 53, 50], ch: [58, 62, 65] },  // Bb7
      { b: [41, 45, 46, 47], ch: [57, 60, 63] },  // F7  <- the skip lives here
      { b: [48, 47, 45, 43], ch: [58, 60, 64] },  // C7 turnaround
    ];
    const RIFF = [ // [barIdx, beat, midi, dur]
      [0, 0, 72, 0.7], [0, 1.66, 74, 0.3], [0, 2, 76, 1.4],
      [1, 2, 77, 0.5], [1, 2.66, 76, 0.3], [1, 3, 72, 0.8],
      [2, 0, 74, 0.7], [2, 1.66, 72, 0.3], [2, 2, 70, 1.2],
      [4, 0, 79, 0.6], [4, 1, 77, 0.4], [4, 1.66, 76, 0.3], [4, 2, 72, 1.3],
      [6, 0, 72, 0.45], [6, 0.66, 72, 0.18], [6, 1.06, 72, 0.18], // <- stutter: same note thrice, late
      [6, 2.2, 70, 0.9],
      [7, 0, 69, 0.6], [7, 2, 67, 1.2],
    ];
    const st = { next: 0, t0: 0, running: false };
    function scheduleBar(barIdx, when) {
      const ch = CH[barIdx % 8];
      // walking bass: quarter notes
      for (let b = 0; b < 4; b++) {
        blip(bus, { f: mf(ch.b[b] + transpose), type: 'triangle', gain: 0.16, dur: BEAT * 0.92, when: when + b * BEAT - c.currentTime });
      }
      // ride: swing pattern 1, 2, 2&, 3, 4, 4&
      for (const [bt, gn] of [[0, 0.05], [1, 0.06], [1.66, 0.035], [2, 0.05], [3, 0.06], [3.66, 0.035]]) {
        noiseSrc(bus, { f0: 6200, q: 1.4, gain: gn, dur: 0.09, when: when + bt * BEAT - c.currentTime });
      }

        noiseSrc(bus, { f0: 2400, q: 0.6, gain: 0.08, dur: 0.03, when: when + 1.02 * BEAT - c.currentTime });

      bus,
      start() { if (st.running) return; st.running = true; st.t0 = c.currentTime + 0.06; st.next = 0; },
      stop() { st.running = false; },
      pump() { // schedule-ahead

    const g = c.createGain(); g.gain.value = 0;
    const muffle = c.createBiquadFilter(); muffle.type = 'lowpass'; muffle.frequency.value = 16000;
    g.connect(muffle).connect(A.master);
    A.bar = { gain: g, muffle, jazz: makeJazz(g, { level: 1 }) };
    A.bar.jazz.start();
  }

  // ---------------- radio ----------------
  function buildRadio() {
    const c = A.ctx;
    const g = c.createGain(); g.gain.value = 0;
    const speaker = c.createBiquadFilter(); speaker.type = 'bandpass'; speaker.frequency.value = 1200; speaker.Q.value = 0.55;
    g.connect(speaker).connect(A.master);
    // static bed
    const st = c.createBufferSource(); st.buffer = A.noiseBuf; st.loop = true;
    const stf = c.createBiquadFilter(); stf.type = 'bandpass'; stf.frequency.value = 1400; stf.Q.value = 0.4;
    const stg = c.createGain(); stg.gain.value = 0;
    st.connect(stf).connect(stg).connect(g); st.start();
    // numbers carrier
    const hum = c.createOscillator(); hum.type = 'sine'; hum.frequency.value = 92;
    const humg = c.createGain(); humg.gain.value = 0; hum.connect(humg).connect(g); hum.start();
    A.radio = { gain: g, staticG: stg, humG: humg, jazz: makeJazz(g, { transpose: 2, level: 0.8 }), beepNext: 0 };
  }
  function radioCycle() {
    if (!A.on) { unlock(); }
    A.station = (A.station + 1) % 4;
    A.numbersHeld = 0;
    UI.toast('RADIO \u2014 ' + A.stations[A.station]);
    if (A.on) {
      if (A.station === 1) A.radio.jazz.start(); else A.radio.jazz.stop();
      if (A.station === 3) A.radio.beepNext = A.ctx.currentTime + 0.6;
    }
    dlog('radio:' + A.station);
  }
  function pumpNumbers() {
    const c = A.ctx;
    if (A.station !== 3) return;
    if (c.currentTime < A.radio.beepNext) return;
    let t = 0;
    for (const grp of [9, 6, 5]) {
      for (let i = 0; i < grp; i++) { blip(A.radio.gain, { f: 1010, gain: 0.12, dur: 0.10, when: t }); t += 0.24; }
      t += 0.85;
    }
    blip(A.radio.gain, { f: 505, gain: 0.05, dur: 0.5, when: t }); // tired sign-off tone
    A.radio.beepNext = c.currentTime + t + 2.4;
  }

  // ---------------- ambience: crickets, wind, void drone ----------------
  function buildAmbience() {
    const c = A.ctx;
    const wind = c.createBufferSource(); wind.buffer = A.noiseBuf; wind.loop = true; wind.playbackRate.value = 0.4;

// ============ 15 main — boot, loop, debug API ============
const GAME = (() => {
  let renderer = null, scene = null, camera = null, amb = null, dir = null;
  let lastT = 0, absT = 0, booted = false;

  // Merge static single-material Lambert meshes into one mesh per
  // (material, shadow flags, district) bucket. Cuts town draw calls ~2-3x.
  // Anything that moves, swaps visibility, or tumbles registers itself in
  // G.dynamicRoots (or is reachable from known refs) and is left alone.
  function mergeStatic(scene) {
    scene.updateMatrixWorld(true);
    const excl = new Set();
    const addRoot = (o) => { if (o) o.traverse ? o.traverse(x => excl.add(x)) : excl.add(o); };
    for (const o of G.dynamicRoots) addRoot(o);
    for (const b of G.barricades) addRoot(b.grp);
    for (const n of (NPCS.list || [])) addRoot(n.p && n.p.grp);
    addRoot(G.gusGrp); addRoot(G.ryeGlass); addRoot(G.shackDoor); addRoot(G.shackBoard);

    const buckets = new Map(), kill = [];
    scene.traverse(o => {
      if (!o.isMesh || o.isInstancedMesh || excl.has(o)) return;
      const m = o.material;
      if (!m || Array.isArray(m) || !m.isMeshLambertMaterial || m.transparent) return;
      const g = o.geometry;
      if (!g || !g.attributes.position || !g.attributes.normal) return;
      const district = Math.abs(o.getWorldPosition(V3).x) > 2000 ? 'in' : 'out';
      const key = m.uuid + '|' + (o.castShadow ? 1 : 0) + (o.receiveShadow ? 1 : 0) + '|' + district;
      let b = buckets.get(key);
      if (!b) { b = { mat: m, cast: o.castShadow, recv: o.receiveShadow, items: [] }; buckets.set(key, b); }
      b.items.push(o);
    });

    for (const b of buckets.values()) {
      if (b.items.length < 2) continue;
      let nv = 0, ni = 0;
      for (const o of b.items) { nv += o.geometry.attributes.position.count; ni += o.geometry.index ? o.geometry.index.count : o.geometry.attributes.position.count; }
      const pos = new Float32Array(nv * 3), nor = new Float32Array(nv * 3);
      const hasUv = b.items.every(o => o.geometry.attributes.uv);
      const uv = hasUv ? new Float32Array(nv * 2) : null;
      const idx = new Uint32Array(ni);
      let vo = 0, io = 0;
      const nm = new THREE.Matrix3();
      for (const o of b.items) {
        const g = o.geometry, p = g.attributes.position, n = g.attributes.normal, u = g.attributes.uv;
        nm.getNormalMatrix(o.matrixWorld);
        for (let i = 0; i < p.count; i++) {
          V3.set(p.getX(i), p.getY(i), p.getZ(i)).applyMatrix4(o.matrixWorld);
          pos[(vo + i) * 3] = V3.x; pos[(vo + i) * 3 + 1] = V3.y; pos[(vo + i) * 3 + 2] = V3.z;
          V3.set(n.getX(i), n.getY(i), n.getZ(i)).applyMatrix3(nm).normalize();
          nor[(vo + i) * 3] = V3.x; nor[(vo + i) * 3 + 1] = V3.y; nor[(vo + i) * 3 + 2] = V3.z;
          if (uv) { uv[(vo + i) * 2] = u.getX(i); uv[(vo + i) * 2 + 1] = u.getY(i); }
        }
        if (g.index) { const ix = g.index; for (let i = 0; i < ix.count; i++) idx[io + i] = ix.getX(i) + vo; io += ix.count; }
        else { for (let i = 0; i < p.count; i++) idx[io + i] = i + vo; io += p.count; }
        vo += p.count;
        kill.push(o);
      }
      const mg = new THREE.BufferGeometry();
      mg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      mg.setAttribute('normal', new THREE.BufferAttribute(nor, 3));
      if (uv) mg.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
      mg.setIndex(new THREE.BufferAttribute(idx, 1));
      const mm = new THREE.Mesh(mg, b.mat);
      mm.castShadow = b.cast; mm.receiveShadow = b.recv;
      scene.add(mm);
    }
    for (const o of kill) { if (o.parent) o.parent.remove(o); }
    dlog('mergeStatic: ' + kill.length + ' meshes -> ' + buckets.size + ' buckets');
  }
  const V3 = new THREE.Vector3();

  function boot(opts) {
    if (booted) return api();

    const H = opts.height || (ENV.headless ? 720 : WIN.innerHeight);

      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(WIN.devicePixelRatio || 1, 2));
      G.renderer = renderer;
      UI.init(opts.container || DOC.body, canvas);

        camera.aspect = WIN.innerWidth / WIN.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(WIN.innerWidth, WIN.innerHeight);
      });
      PLAYER.init(canvas);
    } else if (opts.renderer) {
      renderer = opts.renderer; G.renderer = renderer;
      PLAYER.init(null);
    } else {
      PLAYER.init(null);
    }
    if (renderer) {
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    }

    // lights
    amb = new THREE.AmbientLight(0x8a7a9a, 0.4); scene.add(amb);
    dir = new THREE.DirectionalLight(0xffb070, 0.8);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    const sc = dir.shadow.camera;
    sc.left = -80; sc.right = 80; sc.top = 80; sc.bottom = -80; sc.near = 12; sc.far = 420;
    dir.shadow.bias = -0.0006;
    scene.add(dir); scene.add(dir.target);
    G.amb = amb; G.dir = dir;

    // world
    MAT.init();
    TOWN.build(scene);
    GROVES.build(scene);
    VEH.build(scene);
    NPCS.build(scene);
    INTERIOR.build(scene);
    mergeStatic(scene);
    EDGE.init(scene, camera, amb, dir);
    EDGE.update(0.016, 0); // settle atmosphere before first frame

    dlog('boot ok');
    if (!ENV.headless) {
      lastT = ENV.now();
      const frame = () => {
        const now = ENV.now();
        const dt = Math.min(0.05, (now - lastT) / 1000); lastT = now;
        step(dt);
        WIN.requestAnimationFrame(frame);
      };
      WIN.requestAnimationFrame(frame);
    }
    return api();
  }

  function step(dt) {
    absT += dt;
    const st = G.state;
    // time flows only while playing
    if (st === 'PLAY') {
      G.gameMin += dt * 60 * CFG.MIN_PER_SEC / 60; // dt sec * 0.5 min/sec
      G.gameMin = G.gameMin; G.dayMin = ((G.gameMin % 1440) + 1440) % 1440;
    }
    if (st !== 'ENDING' && st !== 'TERMINAL' && st !== 'CREDITS') PLAYER.update(dt, camera);
    if (st === 'PLAY' || st === 'DIALOG') NPCS.update(dt);
    if (st === 'PLAY') VEH.updateTraffic(dt);
    QUEST.update(dt);
    EDGE.update(dt, absT);
    EDGE.postUpdate();
    for (let i = 0; i < G.anim.length; i++) G.anim[i].update(dt, absT);
    AUDIO.update(dt, absT);
    UI.update(dt);
    if (renderer) renderer.render(scene, camera);
  }

  // ---------------- debug API (drives the game headless or from console) ----------------
  function findInteractDebug() {
    let best = null, bestD = 1e9;
    for (const it of G.interactables) {
      if ((it.inside || null) !== G.inside) continue;
      if (it.hidden && !it.revealed) continue;
      const d2 = dist2(G.player.x, G.player.z, it.x, it.z);
      if (d2 < it.r * it.r && d2 < bestD) { best = it; bestD = d2; }
    }
    if (!G.inside && !G.inCar && G.car) {
      const d2 = dist2(G.player.x, G.player.z, G.car.x, G.car.z);
      if (d2 < 3.4 * 3.4 && d2 < bestD) best = { id: 'car', label: 'Get in the car', onUse: () => PLAYER.enterCar() };
    }
    return best;
  }
  const debug = {
    state: () => G.state,
    flags: () => FLAGS,
    player: () => ({ x: G.player.x, z: G.player.z, yaw: G.player.yaw, inCar: G.inCar, inside: G.inside }),
    car: () => G.car ? { x: G.car.x, z: G.car.z, th: G.car.th, v: G.car.v } : null,
    seams: () => G.seams.map(s => s.id),
    journalList: () => G.journal.map(j => j.title),
    objective: () => G.objective,
    log: () => G.debugLog.slice(-40),
    toasts: () => UI.rec.toasts.slice(-10),
    dialog: () => UI.rec.dialog,
    setPlayerPos(x, z, yaw) { G.player.x = x; G.player.z = z; if (yaw != null) G.player.yaw = yaw; G.camSnap = true; },
    setCarPos(x, z, th) { if (!G.car) return; G.car.x = x; G.car.z = z; if (th != null) G.car.th = th; G.car.pose(); G.camSnap = true; },
    press(k) { G.debugPressed = G.debugPressed || {}; G.debugPressed[k] = true; },
    hold(k, v) { G.debugKeys = G.debugKeys || {}; G.debugKeys[k] = !!v; },
    interactNearest() { const it = findInteractDebug(); if (it) { it.onUse(); return it.id; } return null; },
    nearest() { const it = findInteractDebug(); return it ? it.id : null; },
    choose(i) { DIALOGUE.choose(i); },
    advance() { DIALOGUE.advance(); },
    startDialog(id) { DIALOGUE.start(id); },
    begin() { UI.start(); },
    enterCarNow() { if (!G.inCar) PLAYER.enterCar(); },
    exitCarNow() { if (G.inCar) PLAYER.exitCar(); },
    radio() { AUDIO.radioCycle(); },
    forceTime(min) { G.gameMin = min; G.dayMin = ((min % 1440) + 1440) % 1440; },
    advanceGameMinutes(mins, fps) {
      // simulate real frames so schedules/physics stay honest
      const dt = 1 / (fps || 30);
      const frames = Math.ceil((mins / CFG.MIN_PER_SEC) / dt);
      for (let i = 0; i < frames; i++) step(dt);
      return frames;
    },
    stepFrames(n, dt) { for (let i = 0; i < n; i++) step(dt || 1 / 30); },
    terminal(which) { EDGE.choose(which); },
    drawCalls() { return renderer ? renderer.info.render.calls : -1; },
    triangles() { return renderer ? renderer.info.render.triangles : -1; },
    edge: () => G.edge,
    uiRec: () => UI.rec,
  };

  function api() { return { boot, step, debug }; }
  return { boot, step, debug };
})();

// ============ 99 tail — public API + autoboot ============
return {
  G, CFG, FLAGS, T, M: MAT, TOWN, GROVES, VEH, NPCS, INTERIOR,
  PLAYER, DIALOGUE, QUEST, EDGE, AUDIO, UI,
  boot: GAME.boot, step: GAME.step, debug: GAME.debug,
  util: { terrainH, fmtClock, ss, lerp, clamp, edgeFactorAt, mulberry32 },
};
});

/* ---- browser autoboot ---- */
(function () {
  if (typeof window === 'undefined') return;
  var OE = window.OrangeEmpire;
  if (!OE || !OE._auto) return;
  function go() { try { OE.boot({}); } catch (e) { console.error('[OrangeEmpire] boot failed:', e); } }
  if (document.readyState === 'complete' || document.readyState === 'interactive') go();
  else document.addEventListener('DOMContentLoaded', go);
})();

</script>
