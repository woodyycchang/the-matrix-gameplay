<script>
/* THE ORANGE EMPIRE — Los Angeles, 1937. A simulation in three seams.
   Single-file browser game. Three.js r128. All assets procedural. */
(function (root, factory) {

  else { root.OrangeEmpire = factory(root.THREE, root.document, root.window); root.OrangeEmpire._auto = true; }
})(typeof self !== 'undefined' ? self : this, function (THREE, DOC, WIN, ENVOPT) {
'use strict';
const ENV = Object.assign({
  headless: typeof window === 'undefined',

  glContext: null,             // headless: webgl context
  now: () => (typeof performance !== 'undefined' ? performance.now() : Date.now()),

const CFG = {
  // ---- world geometry (meters) ----
  MAIN_Z: 0, ROAD_HW: 6, WALK_IN: 6, WALK_OUT: 9.4,
  CROSS_X: [-60, 60], CROSS_HW: 5,
  PALM_Z: 64, PALM_HW: 5,
  EAST_X0: 160, EAST_X1: 858,
  // ---- decay rings (distance from origin) ----
  D_DESAT0: 460, D_DESAT1: 660,
  D_DARK0: 600, D_DARK1: 830,
  D_GRID0: 615, D_GRID1: 800,
  D_RISE0: 575, D_RISE1: 855,
  D_TREEWIRE: 665,
  D_GROUND_END: 1130,
  D_BOUNDARY: 965, D_WALL: 1000,
  // ---- time ----
  MIN_PER_SEC: 0.5,            // 1 game-minute = 2 real seconds
  START_MIN: 19 * 60 + 24,     // 7:24 PM, Friday June 11 1937
  // ---- player ----
  EYE: 1.62, WALK: 2.3, RUN: 4.8, BODY_R: 0.35,
  // ---- car ----
  CAR_VMAX: 26, CAR_VREV: -6.5, CAR_ACC: 9.5, CAR_BRAKE: 16, CAR_DRAG: 0.35, CAR_ROLL: 0.9,
  CAR_STEER: 2.0, CAR_LEN: 4.4, CAR_W: 1.78,
};

const FLAGS = {
  started: false, metGus: false, gusStage: 0, hasMatchbook: false, noteRead: false,
  boundaryReached: false, returned: false, epilogueDone: false, enteredBarOnce: false,
  knockedBarricade: 0, visitedShack: false, drank: 0, radioNumbers: false,
  pellWitness: 0, barMusicTime: 0, charlieTalks: 0, twinsSeen: false, paperRead: false,

const G = {
  THREE, ENV, CFG, FLAGS,
  state: 'TITLE',              // TITLE | PLAY | DIALOG | NOTE | JOURNAL | ENDING | TERMINAL | EPILOGUE | PAUSE
  prevState: 'PLAY',
  gameMin: CFG.START_MIN,      // minutes since 00:00, never wraps for schedules (use mod)
  dayMin: CFG.START_MIN,
  inCar: false, inside: null,  // null | 'bar'
  player: { x: -4, z: -3.4, yaw: Math.PI / 2, pitch: 0, vy: 0 },
  quality: 'high',
  muted: false,
  seams: [], journal: [], objective: 0,
  anim: [],                    // {update(dt,t)} tickers
  barricades: [],
  neonMats: [], nightSwapList: [], lampHeads: [], nightLights: [],
  endingSlow: 1,
  camSnap: false,
  dialogNPC: null, dialogNode: null,
  nearInteract: null,
  debugKeys: {}, debugPressed: {},
  dynamicRoots: [],
  car: null, scene: null, camera: null, renderer: null, amb: null, dir: null,
  ryeGlass: null, gusGrp: null, shackDoor: null, shackBoard: null, starsMat: null, moonMat: null,
  colliders: { boxes: [], circles: [] },     // exterior
  barColliders: { boxes: [], circles: [] },  // interior
  interactables: [],
  toasts: [],
  rng: null,
  edge: 0,                     // 0..1 decay factor at player
  debugLog: [],
};
function dlog(s) { G.debugLog.push(s); if (G.debugLog.length > 400) G.debugLog.shift(); }

// ============ 01 util ============
function mulberry32(seed) { let a = seed >>> 0; return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
G.rng = mulberry32(19370611);
const R = () => G.rng();
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const ss = (a, b, x) => { const t = clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); };
const TAU = Math.PI * 2;
function angLerp(a, b, t) { let d = (b - a) % TAU; if (d > Math.PI) d -= TAU; if (d < -Math.PI) d += TAU; return a + d * t; }
function dist2(x1, z1, x2, z2) { const dx = x1 - x2, dz = z1 - z2; return dx * dx + dz * dz; }
function fmtClock(min) {
  let m = ((min % 1440) + 1440) % 1440; let h = Math.floor(m / 60), mm = Math.floor(m % 60);
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12; if (h === 0) h = 12;
  return h + ':' + String(mm).padStart(2, '0') + ' ' + ap;
}
// Terrain height — MUST match GLSL terrainH exactly (see 03_materials).
function terrainH(x, z) {
  const d = Math.sqrt(x * x + z * z);
  const rise = ss(CFG.D_RISE0, CFG.D_RISE1, d);
  if (rise <= 0) return 0;
  let h = Math.sin(x * 0.013 + 2.0) * Math.cos(z * 0.011 - 1.0) * 16.0
        + Math.sin(x * 0.043 + z * 0.017) * 3.5
        + Math.sin(z * 0.051 - x * 0.012) * 3.5
        + rise * 9.0;
  h *= rise;
  const roadInf = ss(0, 40, x) * (1 - ss(840, 900, x)) * (1 - ss(12, 34, Math.abs(z)));
  h *= (1 - roadInf);
  return h;
}
function edgeFactorAt(x, z) { return ss(CFG.D_DESAT0, CFG.D_DARK1, Math.sqrt(x * x + z * z)); }
// Collision helpers ---------------------------------------------------------
function addBox(set, cx, cz, hw, hd) { set.boxes.push({ x: cx, z: cz, hw, hd }); }
function addCircle(set, cx, cz, r) { const c = { x: cx, z: cz, r }; set.circles.push(c); return c; }
// Push a circle (px,pz,r) out of colliders; returns corrected [x,z,hit]
function collideCircle(set, px, pz, r) {
  let hit = false;
  for (let i = 0; i < set.boxes.length; i++) {
    const b = set.boxes[i];
    if (b.dead) continue;
    const dx = px - b.x, dz = pz - b.z;
    const ox = (b.hw + r) - Math.abs(dx), oz = (b.hd + r) - Math.abs(dz);
    if (ox > 0 && oz > 0) {
      hit = true;
      if (ox < oz) px = b.x + Math.sign(dx || 1) * (b.hw + r);
      else pz = b.z + Math.sign(dz || 1) * (b.hd + r);
    }
  }
  for (let i = 0; i < set.circles.length; i++) {
    const c = set.circles[i];
    if (c.dead) continue;
    const dx = px - c.x, dz = pz - c.z, rr = c.r + r;
    const d2 = dx * dx + dz * dz;
    if (d2 < rr * rr && d2 > 1e-9) {
      hit = true; const d = Math.sqrt(d2);
      px = c.x + dx / d * rr; pz = c.z + dz / d * rr;
    }
  }
  return [px, pz, hit];
}

// ============ 02 textures ============
const T = (() => {
  const cache = {};
  function canvasFor(w, h) {
    if (ENV.headless) return ENV.makeCanvas(w, h);
    const c = DOC.createElement('canvas'); c.width = w; c.height = h; return c;
  }
  function isPOT(n) { return (n & (n - 1)) === 0; }
  function toTexture(cv) {
    const pot = isPOT(cv.width) && isPOT(cv.height);
    if (ENV.headless) {
      const g = cv.getContext('2d'); const id = g.getImageData(0, 0, cv.width, cv.height);
      const data = new Uint8Array(id.data.length);
      const W = cv.width, H = cv.height;
      for (let y = 0; y < H; y++) data.set(id.data.subarray((H - 1 - y) * W * 4, (H - y) * W * 4), y * W * 4);
      const t = new THREE.DataTexture(data, W, H, THREE.RGBAFormat);
      t.needsUpdate = true; t.flipY = false;
      t.magFilter = THREE.LinearFilter;
      t.minFilter = pot ? THREE.LinearMipmapLinearFilter : THREE.LinearFilter;
      t.generateMipmaps = pot;
      return t;
    }
    const t = new THREE.CanvasTexture(cv);
    t.minFilter = pot ? THREE.LinearMipmapLinearFilter : THREE.LinearFilter;
    t.generateMipmaps = pot;
    return t;
  }
  function make(key, w, h, fn, wrap) {
    if (cache[key]) return cache[key];
    const cv = canvasFor(w, h); fn(cv.getContext('2d'), w, h);
    const t = toTexture(cv);
    if (wrap !== false) { t.wrapS = t.wrapT = THREE.RepeatWrapping; }
    cache[key] = t; return t;
  }
  function speckle(g, w, h, n, colors, smin, smax, rnd) {
    for (let i = 0; i < n; i++) {
      g.fillStyle = colors[(rnd() * colors.length) | 0];
      const s = smin + rnd() * (smax - smin);
      g.fillRect(rnd() * w, rnd() * h, s, s);
    }
  }
  // ---- ground / paving ----
  const asphalt = () => make('asphalt', 256, 256, (g, w, h) => {
    const r = mulberry32(11); g.fillStyle = '#33312f'; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 2400, ['#3a3835', '#2c2a28', '#3f3c38', '#282624'], 1, 3, r);
    g.strokeStyle = 'rgba(20,18,16,0.5)'; g.lineWidth = 1;
    for (let i = 0; i < 7; i++) { g.beginPath(); let x = r() * w, y = r() * h; g.moveTo(x, y); for (let k = 0; k < 5; k++) { x += (r() - .5) * 60; y += (r() - .5) * 60; g.lineTo(x, y); } g.stroke(); }
  });
  const sidewalk = () => make('sidewalk', 256, 256, (g, w, h) => {
    const r = mulberry32(22); g.fillStyle = '#8d8576'; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 1800, ['#968e7e', '#857d6e', '#9c9484', '#7d7567'], 1, 2.5, r);
    g.strokeStyle = 'rgba(70,64,55,0.7)'; g.lineWidth = 3;
    for (let i = 0; i <= 2; i++) { g.beginPath(); g.moveTo(i * w / 2, 0); g.lineTo(i * w / 2, h); g.stroke(); g.beginPath(); g.moveTo(0, i * h / 2); g.lineTo(w, i * h / 2); g.stroke(); }
  });
  const grass = () => make('grass', 256, 256, (g, w, h) => {
    const r = mulberry32(33); g.fillStyle = '#5d6e38'; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 3200, ['#67793f', '#536331', '#71823f', '#4c5c2e', '#7a8847'], 1, 3, r);
    speckle(g, w, h, 250, ['#8a7a4a', '#6e6038'], 1, 2, r);
  });
  const groveSoil = () => make('groveSoil', 256, 256, (g, w, h) => {
    const r = mulberry32(44); g.fillStyle = '#6b5a3c'; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 2600, ['#75male', '#5d4c30', '#7a6845', '#645236', '#71603f'].map(c => c === '#75male' ? '#756343' : c), 1, 3, r);
    for (let i = 0; i < 4; i++) { g.fillStyle = 'rgba(70,90,45,0.35)'; g.fillRect(0, i * 64 + 18, w, 22); }
    g.fillStyle = 'rgba(40,32,20,0.3)'; for (let i = 0; i < 4; i++) g.fillRect(0, i * 64, w, 5);
  });
  // ---- building materials ----
  const brick = () => make('brick', 256, 256, (g, w, h) => {
    const r = mulberry32(55); g.fillStyle = '#7a4434'; g.fillRect(0, 0, w, h);
    const bh = 16, bw = 42;
    for (let y = 0; y < h; y += bh) {
      const off = (y / bh) % 2 ? bw / 2 : 0;
      for (let x = -bw; x < w; x += bw) {
        const t = ['#82493a', '#6e3c2d', '#8a5040', '#75412f'][(r() * 4) | 0];
        g.fillStyle = t; g.fillRect(x + off + 1.5, y + 1.5, bw - 3, bh - 3);
      }
    }
    g.fillStyle = 'rgba(214,200,180,0.28)'; for (let y = 0; y < h; y += bh) g.fillRect(0, y, w, 1.6);
  });
  const stucco = (key, base, fleck) => make(key, 128, 128, (g, w, h) => {
    const r = mulberry32(66 + key.length); g.fillStyle = base; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 900, fleck, 1, 2, r);
  });
  const wood = () => make('wood', 256, 256, (g, w, h) => {
    const r = mulberry32(77); g.fillStyle = '#7d6b50'; g.fillRect(0, 0, w, h);
    for (let y = 0; y < h; y += 18) {
      g.fillStyle = ['#84725a', '#76654a', '#8a7860'][(r() * 3) | 0]; g.fillRect(0, y, w, 16);
      g.fillStyle = 'rgba(40,32,22,0.5)'; g.fillRect(0, y + 16, w, 2);
    }
  });
  const roof = () => make('roof', 128, 128, (g, w, h) => {
    const r = mulberry32(88); g.fillStyle = '#4a4642'; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 700, ['#534f4a', '#403c38', '#5a5650'], 1, 3, r);
  });
  // ---- facades: wall + windows + parapet, day & night variants ----
  function facade(key, opts) {
    const o = Object.assign({ w: 512, h: 512, base: '#b8a888', trim: '#6e5a40', floors: 2, cols: 4, brickMode: false, awning: null, lit: false, litChance: 0.75, ww: 0.46, wh: 0.5 }, opts);
    return make(key + (o.lit ? '_N' : '_D'), o.w, o.h, (g, w, h) => {
      const r = mulberry32(99 + key.length * 7);
      if (o.brickMode) {
        g.fillStyle = '#7a4434'; g.fillRect(0, 0, w, h);
        const bh = h / 30, bw = w / 9;
        for (let y = 0; y < h; y += bh) { const off = ((y / bh) | 0) % 2 ? bw / 2 : 0; for (let x = -bw; x < w; x += bw) { g.fillStyle = ['#82493a', '#6e3c2d', '#8a5040'][(r() * 3) | 0]; g.fillRect(x + off + 1, y + 1, bw - 2, bh - 2); } }
      } else {
        g.fillStyle = o.base; g.fillRect(0, 0, w, h);
        speckle(g, w, h, 1500, [o.base, shade(o.base, -12), shade(o.base, 10)], 1, 3, r);
      }
      // parapet & base band
      g.fillStyle = o.trim; g.fillRect(0, 0, w, h * 0.045); g.fillRect(0, h * 0.93, w, h * 0.07);
      const rows = o.floors, cols = o.cols;
      const cw = w / cols, ch = (h * 0.86) / rows;
      for (let fy = 0; fy < rows; fy++) for (let fx = 0; fx < cols; fx++) {
        const cx = fx * cw + cw / 2, cy = h * 0.06 + fy * ch + ch / 2;
        const winw = cw * o.ww, winh = ch * o.wh;
        g.fillStyle = o.trim; g.fillRect(cx - winw / 2 - 4, cy - winh / 2 - 4, winw + 8, winh + 8);
        const isLit = o.lit && r() < o.litChance;
        if (isLit) {
          const gr = g.createLinearGradient(0, cy - winh / 2, 0, cy + winh / 2);
          gr.addColorStop(0, '#ffd98a'); gr.addColorStop(1, '#c98c3a'); g.fillStyle = gr;
        } else { g.fillStyle = o.lit ? '#10131c' : '#2c3744'; }
        g.fillRect(cx - winw / 2, cy - winh / 2, winw, winh);
        g.strokeStyle = o.lit && isLit ? 'rgba(120,80,30,0.8)' : 'rgba(180,190,205,0.35)';
        g.lineWidth = 2; g.beginPath();
        g.moveTo(cx, cy - winh / 2); g.lineTo(cx, cy + winh / 2);
        g.moveTo(cx - winw / 2, cy); g.lineTo(cx + winw / 2, cy); g.stroke();
        if (!o.lit && !isLit) { g.fillStyle = 'rgba(255,235,200,0.16)'; g.beginPath(); g.moveTo(cx - winw / 2, cy + winh / 2); g.lineTo(cx - winw / 6, cy - winh / 2); g.lineTo(cx + winw / 8, cy - winh / 2); g.lineTo(cx - winw / 4, cy + winh / 2); g.fill(); }
      }
      if (o.awning) { g.fillStyle = o.awning; for (let fx = 0; fx < cols; fx++) g.fillRect(fx * cw + cw * 0.08, h * 0.60, cw * 0.84, h * 0.05); }
    }, true);
  }
  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);

    r = clamp(r, 0, 255); g = clamp(g, 0, 255); b = clamp(b, 0, 255);

  // ---- text signs ----
  function sign(key, text, opts) {
    const o = Object.assign({ w: 512, h: 128, bg: '#1c1a17', fg: '#e8dcc2', font: 'bold 64px Georgia, "Times New Roman", serif', border: '#8a7a58', sub: null, glow: null }, opts);
    return make('sign_' + key, o.w, o.h, (g, w, h) => {
      g.fillStyle = o.bg; g.fillRect(0, 0, w, h);
      if (o.border) { g.strokeStyle = o.border; g.lineWidth = 6; g.strokeRect(6, 6, w - 12, h - 12); }
      g.textAlign = 'center'; g.textBaseline = 'middle';
      if (o.glow) { g.shadowColor = o.glow; g.shadowBlur = 26; }
      g.fillStyle = o.fg; g.font = o.font;
      // shrink to fit: long names like THE BLUE PACIFIC must not clip
      const maxW = w - 44;

      g.shadowBlur = 0;

  // ---- canopy ----
  const canopy = () => make('canopy', 128, 128, (g, w, h) => {
    const r = mulberry32(111); g.fillStyle = '#39511f'; g.fillRect(0, 0, w, h);
    speckle(g, w, h, 1100, ['#42602a', '#314a1b', '#4c6c30', '#2a4015'], 2, 5, r);
    for (let i = 0; i < 26; i++) { g.fillStyle = '#e08a1e'; g.beginPath(); g.arc(r() * w, r() * h, 3.2 + r() * 2.4, 0, TAU); g.fill(); g.fillStyle = 'rgba(255,210,120,0.65)'; g.beginPath(); g.arc(0, 0, 0, 0, 0); g.fill(); }

  const glow = (key, color, inner) => make('glow_' + key, 128, 128, (g, w, h) => {
    const gr = g.createRadialGradient(w / 2, h / 2, 2, w / 2, h / 2, w / 2);
    gr.addColorStop(0, inner || color); gr.addColorStop(0.35, color); gr.addColorStop(1, 'rgba(0,0,0,0)');

    return make('bub_' + key, 512, 160, (g, w, h) => {
      g.fillStyle = 'rgba(20,18,16,0.88)'; roundRect(g, 8, 8, w - 16, h - 40, 16); g.fill();
      g.beginPath(); g.moveTo(w / 2 - 14, h - 32); g.lineTo(w / 2 + 14, h - 32); g.lineTo(w / 2, h - 6); g.fill();
      g.fillStyle = '#efe6cf'; g.font = 'italic 30px Georgia, serif'; g.textAlign = 'center'; g.textBaseline = 'middle';

    g.fillStyle = '#ddd2b4'; g.fillRect(0, 0, w, h);
    g.fillStyle = '#211d18'; g.textAlign = 'center'; g.font = 'bold 30px Georgia, serif';
    g.fillText('THE EXAMINER', w / 2, 34);
    g.font = '13px Georgia, serif'; g.fillText('FRIDAY, JUNE 11, 1937  ·  FIVE CENTS', w / 2, 56);
    g.fillRect(10, 64, w - 20, 2);
    g.font = 'bold 21px Georgia, serif'; g.fillText('HEAT TO BREAK BY', w / 2, 92); g.fillText('SUNDAY, BUREAU SAYS', w / 2, 116);
    g.textAlign = 'left'; g.fillStyle = '#3a352c';
    for (let i = 0; i < 10; i++) { g.fillRect(14, 134 + i * 11, (i % 3 === 2 ? 0.6 : 0.95) * (w - 28), 5); }
    g.fillStyle = '#211d18'; g.font = 'bold 13px Georgia, serif';
    g.fillText('COUNTY EXTENDS EAST GROVE', 14, 262); g.fillText('ROAD CLOSURE "INDEFINITELY"', 14, 280);
    g.fillStyle = '#3a352c'; for (let i = 0; i < 3; i++) g.fillRect(14, 290 + i * 10, w - 28, 4);
  }, false);
  return { make, facade, sign, asphalt, sidewalk, grass, groveSoil, brick, stucco, wood, roof, canopy, glow, disc, bubble, newspaper, shade };
})();

// ============ 03 materials ============
// GLSL twin of terrainH + smoothstep helpers. Keep EXACTLY in sync with 01_util.terrainH.
const GLSL_TERRAIN = `
float terrainH(float x, float z){
  float d = sqrt(x*x + z*z);
  float rise = smoothstep(${CFG.D_RISE0.toFixed(1)}, ${CFG.D_RISE1.toFixed(1)}, d);
  if (rise <= 0.0) return 0.0;
  float h = sin(x*0.013 + 2.0) * cos(z*0.011 - 1.0) * 16.0
          + sin(x*0.043 + z*0.017) * 3.5
          + sin(z*0.051 - x*0.012) * 3.5
          + rise * 9.0;
  h *= rise;
  float roadInf = smoothstep(0.0, 40.0, x) * (1.0 - smoothstep(840.0, 900.0, x)) * (1.0 - smoothstep(12.0, 34.0, abs(z)));
  h *= (1.0 - roadInf);
  return h;
}`;

const MAT = (() => {
  const lib = {};

  // ---------- ground: textured terrain that decays into green wireframe ----------
  function groundMaterial() {
    const u = {
      tGrass: { value: T.grass() },
      tSoil: { value: T.groveSoil() },
      uSunDir: { value: new THREE.Vector3(0.4, 0.8, 0.3).normalize() },
      uSunCol: { value: new THREE.Color(1.0, 0.85, 0.7) },
      uAmb: { value: new THREE.Color(0.30, 0.30, 0.36) },
      uFogColor: { value: new THREE.Color(0x2a2430) },
      uFogNear: { value: 60 },
      uFogFar: { value: 700 },
      uGridCol: { value: new THREE.Color(0.13, 1.0, 0.45) },
      uTime: { value: 0 },
    };
    const m = new THREE.ShaderMaterial({
      uniforms: u,
      vertexShader: `
        varying vec3 vW; varying vec3 vN; varying float vFogZ;
        ${GLSL_TERRAIN}
        void main(){
          vec3 p = position;
          float h = terrainH(p.x, p.z);
          p.y = h;
          float e = 2.0;
          float hx = terrainH(p.x+e, p.z) - terrainH(p.x-e, p.z);
          float hz = terrainH(p.x, p.z+e) - terrainH(p.x, p.z-e);
          vN = normalize(vec3(-hx/(2.0*e), 1.0, -hz/(2.0*e)));
          vW = p;
          vec4 mv = modelViewMatrix * vec4(p, 1.0);
          vFogZ = -mv.z;
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: `
        varying vec3 vW; varying vec3 vN; varying float vFogZ;
        uniform sampler2D tGrass; uniform sampler2D tSoil;
        uniform vec3 uSunDir; uniform vec3 uSunCol; uniform vec3 uAmb;
        uniform vec3 uFogColor; uniform float uFogNear; uniform float uFogFar;
        uniform vec3 uGridCol; uniform float uTime;
        void main(){
          float d = length(vW.xz);
          if (d > ${CFG.D_GROUND_END.toFixed(1)}) discard;
          // base texture: town grass -> grove soil -> dry scrub
          vec3 grass = texture2D(tGrass, vW.xz * 0.055).rgb;
          vec3 soil  = texture2D(tSoil,  vW.xz * 0.030).rgb;
          float soilMix = smoothstep(92.0, 150.0, d) * (1.0 - smoothstep(700.0, 820.0, d));
          vec3 base = mix(grass, soil, soilMix);
          // lambert
          float nd = max(dot(normalize(vN), normalize(uSunDir)), 0.0);
          vec3 col = base * (uAmb + uSunCol * nd);
          // desaturate ring
          float des = smoothstep(${CFG.D_DESAT0.toFixed(1)}, ${CFG.D_DESAT1.toFixed(1)}, d);
          float lum = dot(col, vec3(0.299, 0.587, 0.114));
          col = mix(col, vec3(lum), des * 0.92);
          // darken ring
          float drk = smoothstep(${CFG.D_DARK0.toFixed(1)}, ${CFG.D_DARK1.toFixed(1)}, d);
          col = mix(col, vec3(0.004, 0.010, 0.006), drk * 0.96);
          // wire grid emerges
          float gf = smoothstep(${CFG.D_GRID0.toFixed(1)}, ${CFG.D_GRID1.toFixed(1)}, d);
          vec2 gp = vW.xz / 8.0;
          vec2 fw = fwidth(gp);
          vec2 gv = abs(fract(gp - 0.5) - 0.5) / max(fw, vec2(1e-4));
          float line = 1.0 - min(min(gv.x, gv.y), 1.0);
          line *= 1.0 - smoothstep(0.22, 0.62, max(fw.x, fw.y));   // lines dissolve, not fatten, far away
          // coarse major lines every 40m, brighter
          vec2 gp2 = vW.xz / 40.0;
          vec2 fw2 = fwidth(gp2);
          vec2 gl2 = abs(fract(gp2 - 0.5) - 0.5) / max(fw2, vec2(1e-4));
          float line2 = 1.0 - min(min(gl2.x, gl2.y), 1.0);
          line2 *= 1.0 - smoothstep(0.22, 0.62, max(fw2.x, fw2.y));
          float pulse = 0.85 + 0.15 * sin(uTime * 1.7 + d * 0.05);
          vec3 grid = uGridCol * (line * 0.75 + line2 * 1.25) * gf * pulse;
          // fog base color, then add grid partially unfogged so it glows through
          float fog = smoothstep(uFogNear, uFogFar, vFogZ);
          col = mix(col, uFogColor, fog);
          col += grid * mix(1.0, 0.25, fog * 0.85);
          gl_FragColor = vec4(col, 1.0);
        }`,
    });
    m.extensions = { derivatives: true };
    lib.groundU = u;
    return m;
  }

  // ---------- east road: asphalt that desaturates, darkens, dissolves ----------
  function eastRoadMaterial() {
    const u = {
      tMap: { value: T.asphalt() },
      uSunDir: { value: new THREE.Vector3(0.4, 0.8, 0.3).normalize() },
      uSunCol: { value: new THREE.Color(1.0, 0.85, 0.7) },
      uAmb: { value: new THREE.Color(0.30, 0.30, 0.36) },
      uFogColor: { value: new THREE.Color(0x2a2430) },
      uFogNear: { value: 60 },
      uFogFar: { value: 700 },
    };
    const m = new THREE.ShaderMaterial({
      uniforms: u, transparent: true, depthWrite: false,
      polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2,
      vertexShader: `
        varying vec3 vW; varying float vFogZ;
        void main(){
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vW = wp.xyz;
          vec4 mv = viewMatrix * wp;
          vFogZ = -mv.z;
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: `
        varying vec3 vW; varying float vFogZ;
        uniform sampler2D tMap;
        uniform vec3 uSunDir; uniform vec3 uSunCol; uniform vec3 uAmb;
        uniform vec3 uFogColor; uniform float uFogNear; uniform float uFogFar;
        void main(){
          float d = length(vW.xz);
          vec3 col = texture2D(tMap, vW.xz * 0.16).rgb;
          float nd = max(uSunDir.y, 0.0);
          col *= (uAmb + uSunCol * nd);
          // center dashes
          float dash = step(abs(vW.z), 0.14) * step(0.55, fract(vW.x * 0.12));
          col = mix(col, vec3(0.85, 0.78, 0.55), dash * 0.8 * (1.0 - smoothstep(420.0, 560.0, vW.x)));
          float des = smoothstep(${CFG.D_DESAT0.toFixed(1)}, ${CFG.D_DESAT1.toFixed(1)}, d);
          float lum = dot(col, vec3(0.299, 0.587, 0.114));
          col = mix(col, vec3(lum), des * 0.92);
          float drk = smoothstep(${CFG.D_DARK0.toFixed(1)}, ${CFG.D_DARK1.toFixed(1)}, d);
          col = mix(col, vec3(0.004, 0.010, 0.006), drk * 0.96);
          float fog = smoothstep(uFogNear, uFogFar, vFogZ);
          col = mix(col, uFogColor, fog);
          float alpha = 1.0 - smoothstep(770.0, 850.0, vW.x);
          gl_FragColor = vec4(col, alpha);
        }`,
    });
    lib.eastRoadU = u;
    return m;
  }

  // ---------- sky dome ----------
  function skyMaterial() {
    const u = {
      uTop: { value: new THREE.Color(0x1c2a52) },
      uMid: { value: new THREE.Color(0x7a5a8a) },
      uHor: { value: new THREE.Color(0xe8843c) },
      uSunPos: { value: new THREE.Vector3(0.7, 0.12, 0.2).normalize() },
      uSunGlow: { value: new THREE.Color(0xffc46a) },
      uGlowAmt: { value: 1.0 },
      uEdge: { value: 0 },
    };
    const m = new THREE.ShaderMaterial({
      uniforms: u, side: THREE.BackSide, depthWrite: false, fog: false,
      vertexShader: `
        varying vec3 vDir;
        void main(){
          vDir = normalize(position);
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: `
        varying vec3 vDir;
        uniform vec3 uTop; uniform vec3 uMid; uniform vec3 uHor;
        uniform vec3 uSunPos; uniform vec3 uSunGlow; uniform float uGlowAmt; uniform float uEdge;
        void main(){
          float y = clamp(vDir.y, -1.0, 1.0);
          vec3 col;
          if (y >= 0.0) {
            float a = pow(y, 0.62);
            col = mix(uHor, uMid, smoothstep(0.0, 0.34, a));
            col = mix(col, uTop, smoothstep(0.30, 1.0, a));
          } else {
            col = mix(uHor, vec3(0.012, 0.02, 0.015), smoothstep(0.0, 0.22, -y));
          }
          float s = max(dot(normalize(vDir), normalize(uSunPos)), 0.0);
          col += uSunGlow * (pow(s, 38.0) * 0.9 + pow(s, 6.0) * 0.22) * uGlowAmt;
          // at the edge of the world the sky dies to void-green-black
          vec3 voidCol = vec3(0.004, 0.016, 0.008);
          voidCol += vec3(0.02, 0.20, 0.08) * pow(max(0.0, 1.0 - abs(y) * 6.0), 2.0); // faint green horizon line
          col = mix(col, voidCol, uEdge);
          gl_FragColor = vec4(col, 1.0);
        }`,
    });
    lib.skyU = u;
    return m;
  }

  // ---------- boundary wall: the place where rendering stops ----------
  function wallMaterial() {
    const u = { uTime: { value: 0 }, uGridCol: { value: new THREE.Color(0.13, 1.0, 0.45) }, uPlayerD: { value: 0 } };
    const m = new THREE.ShaderMaterial({
      uniforms: u, side: THREE.DoubleSide, transparent: true, depthWrite: false, fog: false,
      vertexShader: `
        varying vec3 vW; varying vec2 vUv;
        void main(){
          vUv = uv;
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vW = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }`,
      fragmentShader: `
        varying vec3 vW; varying vec2 vUv;
        uniform float uTime; uniform vec3 uGridCol; uniform float uPlayerD;
        void main(){
          // grid in cylindrical space: u around (scaled to meters), y vertical
          float around = vUv.x * 6283.18; // 2*pi*1000
          vec2 gp = vec2(around, vW.y) / 8.0;
          vec2 fw = fwidth(gp);
          vec2 gv = abs(fract(gp - 0.5) - 0.5) / max(fw, vec2(1e-4));
          float line = 1.0 - min(min(gv.x, gv.y), 1.0);
          line *= 1.0 - smoothstep(0.25, 0.7, max(fw.x, fw.y));
          vec2 gp2 = vec2(around, vW.y) / 40.0;
          vec2 fw2 = fwidth(gp2);
          vec2 gl2 = abs(fract(gp2 - 0.5) - 0.5) / max(fw2, vec2(1e-4));
          float line2 = 1.0 - min(min(gl2.x, gl2.y), 1.0);
          line2 *= 1.0 - smoothstep(0.25, 0.7, max(fw2.x, fw2.y));
          float scan = 0.5 + 0.5 * sin(vW.y * 2.2 - uTime * 2.4);
          float hFade = 1.0 - smoothstep(70.0, 150.0, vW.y);
          float appear = smoothstep(710.0, 945.0, uPlayerD);   // the wall only exists if you go looking
          vec3 col = uGridCol * (line * 0.55 + line2 * 1.1) * (0.8 + 0.25 * scan);
          float alpha = clamp(line * 0.7 + line2 * 0.95, 0.0, 1.0) * hFade;
          alpha = max(alpha, 0.05 * hFade); // faint dark film between lines
          alpha *= appear;
          gl_FragColor = vec4(col, alpha);
        }`,
    });
    m.extensions = { derivatives: true };
    lib.wallU = u;
    return m;
  }

  // ---------- shared basic materials ----------
  function init() {
    const L = (opts) => new THREE.MeshLambertMaterial(opts);
    lib.asphalt = L({ map: T.asphalt() });
    lib.sidewalk = L({ map: T.sidewalk() });
    lib.brick = L({ map: T.brick() });
    lib.stuccoTan = L({ map: T.stucco('stuccoTan', '#c9b896', ['#d4c4a2', '#bcab88', '#cfbf9e']) });
    lib.stuccoCream = L({ map: T.stucco('stuccoCream', '#ddd2b4', ['#e6dcc2', '#d2c6a6', '#e0d5b8']) });
    lib.stuccoSage = L({ map: T.stucco('stuccoSage', '#9aa382', ['#a5ad8e', '#8d9675', '#a9b292']) });
    lib.stuccoRose = L({ map: T.stucco('stuccoRose', '#c49a84', ['#cfa790', '#b88e78', '#d2ab94']) });
    lib.wood = L({ map: T.wood() });
    lib.woodDark = L({ color: 0x5a4936, map: T.wood() });
    lib.roof = L({ map: T.roof() });
    lib.trim = L({ color: 0x6e5a40 });
    lib.trimGreen = L({ color: 0x3c5a44 });
    lib.trunk = L({ color: 0x6b5236 });
    lib.canopy = L({ map: T.canopy() });
    lib.palmTrunk = L({ color: 0x8a7354 });
    lib.palmFrond = L({ color: 0x4d6628 });
    lib.pole = L({ color: 0x5c4a36 });
    lib.iron = L({ color: 0x2e2c28 });
    lib.glassNight = new THREE.MeshBasicMaterial({ color: 0xffd98a });
    lib.glassDay = L({ color: 0x2c3744 });
    lib.skin = L({ color: 0xc9966e });
    lib.skin2 = L({ color: 0x8a5e3c });
    lib.white = L({ color: 0xd8d2c2 });
    lib.black = L({ color: 0x1c1a18 });
    lib.wire = new THREE.LineBasicMaterial({ color: 0x14160f });
    lib.wireGreen = new THREE.MeshBasicMaterial({ color: 0x22ff66, wireframe: true });
    lib.orange = L({ color: 0xe08a1e });
    lib.ground = groundMaterial();
    lib.eastRoad = eastRoadMaterial();
    lib.sky = skyMaterial();
    lib.wall = wallMaterial();

  return { lib, init };
})();

// ============ 04 world: town ============
const TOWN = (() => {
  const M = MAT.lib;
  let scene;
  const nightSwap = [];   // {mat, day, night}
  const neonMats = [];    // flicker targets {mat, base}
  const lampHeads = [];

  function plane(w, d, mat, x, y, z, repX, repY, rotY) {
    const g = new THREE.PlaneGeometry(w, d);
    g.rotateX(-Math.PI / 2);
    if (rotY) g.rotateY(rotY);
    const m = new THREE.Mesh(g, mat);
    m.position.set(x, y, z);
    if (repX && mat.map) { mat.map.repeat.set(repX, repY); }
    m.receiveShadow = true;
    scene.add(m);
    return m;
  }
  function box(w, h, d, mat, x, y, z, cast) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    if (cast !== false) m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
    return m;
  }

  // facade-front building. side: -1 building is north of Main (front faces +z), +1 south (front faces -z)
  function building(key, x, side, w, h, d, opts) {
    const o = Object.assign({ floors: Math.max(1, Math.round(h / 4.6)), cols: Math.max(2, Math.round(w / 5)), wallMat: M.stuccoTan, brickMode: false, base: '#c9b896', trim: '#6e5a40', awning: null, litChance: 0.75, sign: null, neon: null, parapet: true }, opts);
    const z = side * (9.6 + d / 2);
    const grp = new THREE.Group();
    const fd = T.facade(key, { base: o.base, trim: o.trim, floors: o.floors, cols: o.cols, brickMode: o.brickMode, awning: o.awning, lit: false, litChance: o.litChance });
    const fn = T.facade(key, { base: o.base, trim: o.trim, floors: o.floors, cols: o.cols, brickMode: o.brickMode, awning: o.awning, lit: true, litChance: o.litChance });
    const frontMat = new THREE.MeshLambertMaterial({ map: fd });
    nightSwap.push({ mat: frontMat, day: fd, night: fn });
    const sideMat = o.brickMode ? M.brick : o.wallMat;
    // box face order: +x,-x,+y,-y,+z,-z
    const mats = side < 0
      ? [sideMat, sideMat, M.roof, sideMat, frontMat, sideMat]
      : [sideMat, sideMat, M.roof, sideMat, sideMat, frontMat];
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mats);
    body.position.set(0, h / 2, 0);
    body.castShadow = true; body.receiveShadow = true;
    grp.add(body);
    if (o.parapet) {
      const p = new THREE.Mesh(new THREE.BoxGeometry(w + 0.3, 0.7, d + 0.3), new THREE.MeshLambertMaterial({ color: o.trim }));
      p.position.set(0, h + 0.35, 0); grp.add(p);
    }
    grp.position.set(x, 0, z);
    scene.add(grp);
    addBox(G.colliders, x, z, w / 2, d / 2);
    const frontZ = z - side * (d / 2);
    if (o.sign) addSign(o.sign, x, frontZ - side * 0.12, side, w);
    if (o.neon) addNeon(o.neon, x, frontZ - side * 0.3, side);
    return { grp, x, z, w, h, d, side, frontZ };
  }

  function addSign(s, x, z, side, bw) {
    const tex = T.sign(s.key, s.text, { sub: s.sub, glow: s.glow, fg: s.fg || '#e8dcc2', bg: s.bg || '#1c1a17', font: s.font || 'bold 64px Georgia, "Times New Roman", serif', border: s.border });
    const w = s.w || Math.min(bw * 0.82, 9);
    const h = w * (s.ratio || 0.25);
    const mat = s.glow ? new THREE.MeshBasicMaterial({ map: tex }) : new THREE.MeshLambertMaterial({ map: tex });
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    m.position.set(x + (s.dx || 0), s.y || 4.2, z);
    m.rotation.y = side < 0 ? 0 : Math.PI;
    scene.add(m);
    if (s.glow) neonMats.push({ mat, base: 1 });
    return m;
  }

  function addNeon(n, x, z, side) {
    // glow sprite + light
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: T.glow(n.key, n.color, n.inner), color: 0xffffff, transparent: true, opacity: 0.55, depthWrite: false }));
    spr.scale.set(n.s || 7, (n.s || 7) * 0.6, 1);
    spr.position.set(x + (n.dx || 0), n.y || 4.6, z - side * 0.4);
    scene.add(spr);
    neonMats.push({ mat: spr.material, base: 0.55, sprite: true, seed: x });
    if (n.light) {
      const pl = new THREE.PointLight(n.lightColor || n.color, 0.0, 26, 2);
      pl.position.set(x + (n.dx || 0), (n.y || 4.6) - 0.4, z - side * 2.2);
      scene.add(pl);
      G.nightLights.push({ light: pl, max: n.intensity || 1.1, flicker: n.flicker });
    }
  }

  function lamp(x, z) {
    const g = new THREE.Group();
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 4.6, 6), M.iron);
    pole.position.y = 2.3; pole.castShadow = true; g.add(pole);
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.07, 0.07), M.iron);
    arm.position.set(z > 0 ? -0.42 : 0.42, 4.5, 0); g.add(arm);
    const headMat = new THREE.MeshBasicMaterial({ color: 0x33301f });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 6), headMat);
    head.position.set(z > 0 ? -0.84 : 0.84, 4.42, 0); g.add(head);
    const pool = new THREE.Sprite(new THREE.SpriteMaterial({ map: T.glow('lamp', 'rgba(255,196,100,0.85)'), transparent: true, opacity: 0, depthWrite: false }));
    pool.scale.set(7, 7, 1); pool.position.set(z > 0 ? -0.84 : 0.84, 3.2, 0);
    g.add(pool);
    g.position.set(x, 0, z);
    scene.add(g);
    addCircle(G.colliders, x, z, 0.22);
    lampHeads.push({ headMat, pool: pool.material });
  }

  function palm(x, z, s) {
    s = s || 1;
    const h = (5.5 + R() * 2.5) * s;
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14 * s, 0.26 * s, h, 6), M.palmTrunk);
    trunk.position.set(x, h / 2, z); trunk.rotation.z = (R() - 0.5) * 0.08; trunk.castShadow = true;
    scene.add(trunk);
    for (let i = 0; i < 7; i++) {
      const fr = new THREE.Mesh(new THREE.BoxGeometry(2.6 * s, 0.05, 0.5 * s), M.palmFrond);
      const a = (i / 7) * TAU + R() * 0.5;
      fr.position.set(x + Math.cos(a) * 1.05 * s, h + 0.1, z + Math.sin(a) * 1.05 * s);
      fr.rotation.y = -a; fr.rotation.z = 0.42 + R() * 0.2;
      fr.castShadow = true;
      scene.add(fr);
    }
    addCircle(G.colliders, x, z, 0.3);
  }

  function phonePole(x, z) {
    const p = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.14, 7.4, 6), M.pole);
    p.position.set(x, 3.7, z); p.castShadow = true; scene.add(p);
    const cross = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.1), M.pole);
    cross.position.set(x, 6.7, z); scene.add(cross);
    addCircle(G.colliders, x, z, 0.18);
    return { x, z };
  }
  function wireBetween(a, b, sag, pts) {
    pts = pts || 8;
    for (const dy of [0, -0.35]) {
      const arr = [];
      for (let i = 0; i <= pts; i++) {
        const t = i / pts;
        arr.push(new THREE.Vector3(
          lerp(a.x, b.x, t),
          6.7 + dy - Math.sin(t * Math.PI) * sag,
          lerp(a.z, b.z, t)
        ));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(arr);
      scene.add(new THREE.Line(geo, M.wire));
    }
  }

  function bungalow(x, z, side, palette) {
    // side: front faces toward Palm Ave (z=64). side=-1 house south of ave (front +z), +1 north (front -z)
    const w = 7.5 + R() * 2, d = 6.5, h = 3.2;
    const wall = palette;
    const body = box(w, h, d, wall, x, h / 2, z);
    // gable roof: rotated box sunk into the top
    const roof = new THREE.Mesh(new THREE.BoxGeometry(w * 0.76, w * 0.76, d + 0.9), M.roof);
    roof.rotation.z = Math.PI / 4;
    roof.position.set(x, h + 0.18, z);
    roof.scale.y = 0.5; roof.scale.x = 0.95;
    roof.castShadow = true;
    scene.add(roof);
    // porch

// ============ 05 world: groves & the edge ============
const GROVES = (() => {
  const M = MAT.lib;
  let scene;

  function treeField() {
    // deterministic orchard grid with jitter; density thins toward the edge
    const near = [], far = [], wire = [];
    const step = 13;
    for (let gx = -840; gx <= 880; gx += step) {
      for (let gz = -840; gz <= 840; gz += step) {
        const x = gx + (R() - 0.5) * 3.2, z = gz + (R() - 0.5) * 3.2;
        const d = Math.sqrt(x * x + z * z);
        if (d < 165 || d > 832) continue;
        // exclusions: town rect, road corridors, shack clearing, windmill
        if (x > -160 && x < 160 && z > -50 && z < 118) continue;
        if (Math.abs(z) < 13.5 && x > 130) continue;                  // east grove road
        if (dist2(x, z, 335, 26) < 14 * 14) continue;                  // shack clearing
        if (dist2(x, z, 240, -42) < 11 * 11) continue;                 // windmill
        if (dist2(x, z, 760, -2) < 9 * 9) continue;                    // truck
        const keep = 1 - ss(480, 810, d) * 0.88;
        if (R() > keep) continue;
        const rec = { x, z, y: terrainH(x, z), d, s: 0.85 + R() * 0.4, rot: R() * TAU };
        if (d > CFG.D_TREEWIRE) wire.push(rec);
        else if (d < 300) near.push(rec);
        else far.push(rec);
        addCircle(G.colliders, x, z, 0.5);
      }
    }
    const dummy = new THREE.Object3D();
    const col = new THREE.Color();

    function makeSet(recs, shadow) {
      if (!recs.length) return;
      const trunkG = new THREE.CylinderGeometry(0.14, 0.22, 1.5, 6);
      trunkG.translate(0, 0.75, 0);
      const canG = new THREE.IcosahedronGeometry(1.55, 1);
      canG.translate(0, 2.45, 0);
      const trunkI = new THREE.InstancedMesh(trunkG, new THREE.MeshLambertMaterial({ color: 0x6b5236 }), recs.length);
      const canI = new THREE.InstancedMesh(canG, new THREE.MeshLambertMaterial({ map: T.canopy() }), recs.length);
      trunkI.castShadow = shadow; canI.castShadow = shadow;
      recs.forEach((r, i) => {
        dummy.position.set(r.x, r.y, r.z);
        dummy.rotation.set(0, r.rot, (R() - 0.5) * 0.06);
        dummy.scale.set(r.s, r.s * (0.9 + R() * 0.25), r.s);
        dummy.updateMatrix();
        trunkI.setMatrixAt(i, dummy.matrix); canI.setMatrixAt(i, dummy.matrix);
        const des = ss(CFG.D_DESAT0, CFG.D_DESAT1, r.d);
        const drk = 1 - 0.92 * ss(CFG.D_DARK0, CFG.D_DARK1, r.d);
        const v = (1 - des) * 1 + des * 0.62;
        col.setRGB(v * drk, v * drk, v * drk);
        trunkI.setColorAt(i, col); canI.setColorAt(i, col);
      });
      trunkI.instanceMatrix.needsUpdate = true; canI.instanceMatrix.needsUpdate = true;
      if (trunkI.instanceColor) trunkI.instanceColor.needsUpdate = true;
      if (canI.instanceColor) canI.instanceColor.needsUpdate = true;
      scene.add(trunkI); scene.add(canI);
    }
    makeSet(near, true);
    makeSet(far, false);

    // wireframe trees — the grove forgetting how to be a grove
    if (wire.length) {
      const trunkG = new THREE.CylinderGeometry(0.14, 0.2, 1.5, 5, 1, true);
      trunkG.translate(0, 0.75, 0);
      const canG = new THREE.IcosahedronGeometry(1.5, 0);
      canG.translate(0, 2.4, 0);
      const wm1 = new THREE.MeshBasicMaterial({ color: 0x2aff70, wireframe: true, transparent: true, opacity: 0.85 });
      const wm2 = new THREE.MeshBasicMaterial({ color: 0x2aff70, wireframe: true, transparent: true, opacity: 0.85 });
      const trunkI = new THREE.InstancedMesh(trunkG, wm1, wire.length);
      const canI = new THREE.InstancedMesh(canG, wm2, wire.length);
      wire.forEach((r, i) => {
        dummy.position.set(r.x, r.y, r.z);
        dummy.rotation.set(0, r.rot, 0);
        dummy.scale.set(r.s, r.s, r.s);
        dummy.updateMatrix();
        trunkI.setMatrixAt(i, dummy.matrix); canI.setMatrixAt(i, dummy.matrix);
        const fade = 0.45 + 0.55 * (1 - ss(CFG.D_TREEWIRE, 832, r.d));
        col.setRGB(0.16 * fade + 0.05, 1.0 * fade, 0.44 * fade + 0.04);
        trunkI.setColorAt(i, col); canI.setColorAt(i, col);
      });
      trunkI.instanceMatrix.needsUpdate = true; canI.instanceMatrix.needsUpdate = true;
      scene.add(trunkI); scene.add(canI);
    }
    dlog('trees near=' + near.length + ' far=' + far.length + ' wire=' + wire.length);
  }

  // ---------- barricades ----------
  function barricadeTex(kind) {
    if (kind === 1) return T.make('barr1', 512, 128, (g, w, h) => {
      g.fillStyle = '#d8d2c2'; g.fillRect(0, 0, w, h);

      for (let i = -2; i < 9; i++) { g.fillStyle = i % 2 ? '#b8b09a' : '#c8541e'; g.save(); g.translate(i * 70, 0); g.transform(1, 0, -0.55, 1, 0, 0); g.fillRect(0, 0, 36, h); g.restore(); }
      g.restore();
      g.fillStyle = 'rgba(216,210,194,0.92)'; g.fillRect(40, 26, w - 80, h - 52);
      g.strokeStyle = '#1c1a17'; g.lineWidth = 4; g.strokeRect(40, 26, w - 80, h - 52);
      g.fillStyle = '#1c1a17'; g.font = 'bold 52px Georgia, serif'; g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText('ROAD CLOSED', w / 2, h / 2 + 2);
    }, false);
    if (kind === 2) return T.make('barr2', 512, 128, (g, w, h) => {

      g.font = '26px Georgia, serif'; g.fillText('BY ORDER · COUNTY OF LOS ANGELES', w / 2, 96);

    return T.make('barr3', 512, 160, (g, w, h) => {
      g.fillStyle = '#7d6b50'; g.fillRect(0, 0, w, h);

      g.fillStyle = '#e8e2d2'; g.textAlign = 'center'; g.textBaseline = 'middle';

  function barricade(x, kind) {
    const grp = new THREE.Group();
    const tex = barricadeTex(kind);
    const W = kind === 3 ? 4.6 : 7.2, H = kind === 3 ? 1.5 : 1.0;
    const plank = new THREE.Mesh(new THREE.PlaneGeometry(W, H), new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide }));
    plank.position.y = kind === 3 ? 1.5 : 1.15;
    grp.add(plank);
    // legs (A-frames)
    for (const lx of [-W / 2 + 0.5, W / 2 - 0.5]) {
      for (const a of [0.42, -0.42]) {

  function sky() {
    const dome = new THREE.Mesh(new THREE.SphereGeometry(1500, 32, 18), M.sky);
    dome.frustumCulled = false;

    const N = 850, pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const a = R() * TAU, e = Math.asin(R() * 0.92 + 0.06);
      const r2 = 1390;
      pos[i * 3] = Math.cos(a) * Math.cos(e) * r2;
      pos[i * 3 + 1] = Math.sin(e) * r2;
      pos[i * 3 + 2] = Math.sin(a) * Math.cos(e) * r2;

    const sg = new THREE.BufferGeometry();
    sg.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    const recs = [];
    for (let x = 175; x <= 470; x += 26) for (const z of [-15.5, 15.5]) recs.push({ x: x + (R() - 0.5) * 3, z });
    const geo = new THREE.CylinderGeometry(0.16, 0.22, 0.6, 7);
    geo.translate(0, 0.3, 0);
    const inst = new THREE.InstancedMesh(geo, new THREE.MeshLambertMaterial({ color: 0x1f1c18 }), recs.length);
    const dummy = new THREE.Object3D();
    recs.forEach((r, i) => { dummy.position.set(r.x, 0, r.z); dummy.updateMatrix(); inst.setMatrixAt(i, dummy.matrix); });
    inst.instanceMatrix.needsUpdate = true;
    scene.add(inst);

  // ---------- the ground itself ----------
  function terrain() {
    // one big displaced sheet; the vertex shader raises the far hills,
    // the fragment shader desaturates, darkens, and finally draws the grid
    const g = new THREE.PlaneGeometry(2320, 2320, 152, 152);
    g.rotateX(-Math.PI / 2);                      // bake into attributes: shader reads x,z
    const m = new THREE.Mesh(g, MAT.lib.ground);

    const chrome = new THREE.MeshLambertMaterial({ color: 0x9aa0a8 });
    const glass = new THREE.MeshLambertMaterial({ color: 0x1c2630 });
    const mesh = (geo, mat, x, y, z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x, y, z); m.castShadow = true; g.add(m); return m; };
    const isTruck = kind === 'truck';
    // running boards + frame
    mesh(new THREE.BoxGeometry(4.2, 0.16, 1.95), dark, 0, 0.42, 0);
    // main body
    mesh(new THREE.BoxGeometry(isTruck ? 1.9 : 3.0, 0.78, 1.7), body, isTruck ? 0.65 : -0.25, 0.95, 0);
    // hood (narrower, forward)
    mesh(new THREE.BoxGeometry(1.5, 0.62, 1.25), body, 1.75, 0.93, 0);
    // cab / roof
    const cab = mesh(new THREE.BoxGeometry(isTruck ? 1.25 : 1.9, 0.72, 1.55), body, isTruck ? 0.75 : -0.35, 1.66, 0);
    // windows: front + sides
    mesh(new THREE.PlaneGeometry(1.35, 0.5), glass, (isTruck ? 0.75 : -0.35) + (isTruck ? 0.64 : 0.96), 1.7, 0).rotation.y = Math.PI / 2;
    for (const s of [-1, 1]) {
      const w = mesh(new THREE.PlaneGeometry(isTruck ? 0.9 : 1.5, 0.46), glass, isTruck ? 0.75 : -0.35, 1.68, s * 0.79);
      w.rotation.y = s > 0 ? 0 : Math.PI;
    }
    if (isTruck) mesh(new THREE.BoxGeometry(2.2, 0.55, 1.8), new THREE.MeshLambertMaterial({ color: 0x6a5a40 }), -1.35, 1.0, 0);
    else mesh(new THREE.BoxGeometry(0.8, 0.6, 1.6), body, -1.85, 1.05, 0); // trunk slope
    // grille + bumpers
    mesh(new THREE.BoxGeometry(0.1, 0.55, 1.0), chrome, 2.52, 0.93, 0);
    mesh(new THREE.BoxGeometry(0.1, 0.14, 1.9), chrome, 2.62, 0.5, 0);
    mesh(new THREE.BoxGeometry(0.1, 0.14, 1.9), chrome, isTruck ? -2.55 : -2.35, 0.5, 0);
    // fenders (half cylinders over wheels)
    const fg = new THREE.CylinderGeometry(0.55, 0.55, 0.34, 10, 1, false, 0, Math.PI);
    for (const [fx, fz] of [[1.55, 0.85], [1.55, -0.85], [-1.45, 0.85], [-1.45, -0.85]]) {
      const f = new THREE.Mesh(fg, body);
      f.rotation.z = Math.PI / 2; f.rotation.y = Math.PI / 2;
      f.position.set(fx, 0.62, fz); f.castShadow = true; g.add(f);
    }
    // wheels
    const wg = new THREE.CylinderGeometry(0.44, 0.44, 0.28, 12);
    const hub = new THREE.CylinderGeometry(0.16, 0.16, 0.3, 8);
    for (const [wx, wz] of [[1.55, 0.86], [1.55, -0.86], [-1.45, 0.86], [-1.45, -0.86]]) {
      const w = new THREE.Mesh(wg, dark); w.rotation.x = Math.PI / 2; w.position.set(wx, 0.44, wz); g.add(w);
      const h = new THREE.Mesh(hub, chrome); h.rotation.x = Math.PI / 2; h.position.set(wx, 0.44, wz); g.add(h);
    }
    // spare on back
    if (!isTruck) { const sp = new THREE.Mesh(wg, dark); sp.rotation.y = Math.PI / 2; sp.position.set(-2.32, 1.0, 0); sp.scale.set(1, 1, 0.6); g.add(sp); }
    // headlight lenses
    const lensMat = new THREE.MeshBasicMaterial({ color: 0x4a4636 });
    const lenses = [];
    for (const s of [-1, 1]) {
      const l = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 6), lensMat);
      l.position.set(2.45, 1.18, s * 0.62); g.add(l); lenses.push(l);
    }
    return { grp: g, lensMat };
  }

  // ---------------- player car ----------------
  function buildPlayerCar() {
    const c = makeCar(0x7a2e22, 'sedan'); // oxblood red sedan
    const grp = c.grp;
    grp.rotation.order = 'YZX';
    G.dynamicRoots.push(grp);
    scene.add(grp);
    // headlight rig
    const spots = [];
    for (const s of [-1, 1]) {
      const sp = new THREE.SpotLight(0xffe9b0, 0, 60, 0.42, 0.55, 1.2);
      sp.position.set(2.45, 1.18, s * 0.62);
      const tgt = new THREE.Object3D(); tgt.position.set(14, 0.4, s * 1.4);
      grp.add(tgt); sp.target = tgt; grp.add(sp);
      spots.push(sp);
    }
    const beams = [];
    for (const s of [-1, 1]) {
      const b = new THREE.Sprite(new THREE.SpriteMaterial({ map: T.glow('beam', 'rgba(255,233,176,0.55)'), transparent: true, opacity: 0, depthWrite: false }));
      b.scale.set(2.4, 1.6, 1); b.position.set(3.4, 1.0, s * 0.62);
      grp.add(b); beams.push(b);
    }
    G.car = {
      x: 10, z: -4.2, th: Math.PI / 2, v: 0, grp,
      lights: false, lensMat: c.lensMat, spots, beams,
      setLights(on) {
        this.lights = on;
        this.lensMat.color.setHex(on ? 0xfff0c0 : 0x4a4636);
        for (const s of spots) s.intensity = on ? 1.7 : 0;
        for (const b of beams) b.material.opacity = on ? 0.5 : 0;
      },
      pose() {
        const t = this;
        const hF = terrainH(t.x + Math.sin(t.th) * 1.6, t.z + Math.cos(t.th) * 1.6);
        const hB = terrainH(t.x - Math.sin(t.th) * 1.6, t.z - Math.cos(t.th) * 1.6);
        const rx = Math.cos(t.th), rz = -Math.sin(t.th);
        const hL = terrainH(t.x - rx * 0.9, t.z - rz * 0.9);
        const hR = terrainH(t.x + rx * 0.9, t.z + rz * 0.9);
        grp.position.set(t.x, (hF + hB) / 2, t.z);
        grp.rotation.y = t.th - Math.PI / 2;
        grp.rotation.z = Math.atan2(hF - hB, 3.2);
        grp.rotation.x = Math.atan2(hL - hR, 1.8);
      },
    };
    G.car.pose();
  }

  function breakBarricade(b, dirx, dirz, v) {
    b.broken = true; b.boxRef.dead = true;
    if (b.drumRefs) for (const dr of b.drumRefs) dr.dead = true;
    FLAGS.knockedBarricade++;
    UI.toast(b.kind === 3 ? 'The sign splinters. Hand-paint and all.' : 'The barricade goes over.');
    AUDIO.thud();
    dlog('barricade broken x=' + b.x);
    const grp = b.grp, vel = { x: dirx * v * 0.35, y: 3.2 + Math.min(v * 0.12, 2.5), z: dirz * v * 0.35 };
    let life = 0;
    G.anim.push({
      update(dt) {
        if (life > 2.2) return;
        life += dt;
        vel.y -= 9.8 * dt;
        grp.position.x += vel.x * dt; grp.position.y += vel.y * dt; grp.position.z += vel.z * dt;
        grp.rotation.x += dt * 4.2; grp.rotation.z += dt * 1.8;
        if (grp.position.y < 0.18 && vel.y < 0) { vel.y *= -0.3; vel.x *= 0.6; vel.z *= 0.6; grp.position.y = 0.18; if (Math.abs(vel.y) < 0.6) life = 99; }
      }
    });
    QUEST.onBarricade();
  }

  function updateCar(dt, inp) {
    const c = G.car;
    const acc = inp.f ? CFG.CAR_ACC : 0;
    if (inp.b) {
      if (c.v > 0.4) c.v -= CFG.CAR_BRAKE * dt;
      else c.v -= CFG.CAR_ACC * 0.55 * dt;
    }
    c.v += acc * dt;
    c.v -= c.v * CFG.CAR_DRAG * dt;
    if (!inp.f && !inp.b) {
      const r = CFG.CAR_ROLL * dt;
      if (Math.abs(c.v) <= r) c.v = 0; else c.v -= Math.sign(c.v) * r;
    }
    c.v = clamp(c.v, CFG.CAR_VREV, CFG.CAR_VMAX * (G.endingSlow ? G.endingSlow : 1));
    const steer = (inp.l ? 1 : 0) - (inp.r ? 1 : 0);
    const turn = CFG.CAR_STEER * clamp(c.v / 9, -1, 1) * (1 - 0.45 * ss(11, 26, Math.abs(c.v)));
    c.th += steer * turn * dt;
    c.x += Math.sin(c.th) * c.v * dt;
    c.z += Math.cos(c.th) * c.v * dt;

    // barricade impacts first
    const fx = Math.sin(c.th), fz = Math.cos(c.th);
    for (const b of G.barricades) {
      if (b.broken) continue;
      for (const off of [1.9, 0.4]) {
        const px = c.x + fx * off, pz = c.z + fz * off;
        const ox = (b.boxRef.hw + 0.95) - Math.abs(px - b.boxRef.x);
        const oz = (b.boxRef.hd + 0.95) - Math.abs(pz - b.boxRef.z);
        if (ox > 0 && oz > 0) {
          if (Math.abs(c.v) > 5.5) { breakBarricade(b, fx, fz, Math.abs(c.v)); c.v *= 0.82; }
          break;
        }
      }
    }
    // body collision: 3 circles
    let hitAny = false;
    for (const off of [-1.5, 0.2, 1.8]) {
      let px = c.x + fx * off, pz = c.z + fz * off;
      const [nx, nz, hit] = collideCircle(G.colliders, px, pz, 0.92);
      if (hit) { c.x += nx - px; c.z += nz - pz; hitAny = true; }
    }
    if (hitAny) { c.v *= 0.22; AUDIO.thud(0.4); }
    c.pose();
    AUDIO.setEngine(Math.abs(c.v) / CFG.CAR_VMAX, inp.f ? 1 : 0);
  }

  // ---------------- parked + traffic ----------------
  function parked(x, z, th, hex) {
    const c = makeCar(hex, 'sedan');
    c.grp.position.set(x, 0, z); c.grp.rotation.y = th - Math.PI / 2;
    scene.add(c.grp);
    addBox(G.colliders, x, z, Math.abs(Math.sin(th)) > 0.5 ? 2.3 : 1.0, Math.abs(Math.sin(th)) > 0.5 ? 1.0 : 2.3);
  }

  function trafficCar(hex, kind, path, speed, phase) {
    const c = makeCar(hex, kind);
    scene.add(c.grp);
    traffic.push({ grp: c.grp, path, speed, s: phase || 0 });
    G.dynamicRoots.push(c.grp);
  }
  // path: loop along Main x in [-150,266], lanes z=±3
  function mainLoopPos(s) {
    const A = 416, r = 3, H = Math.PI * r; // straight 416 each way
    const L = 2 * A + 2 * H;
    s = ((s % L) + L) % L;
    if (s < A) return { x: -150 + s, z: 3, th: Math.PI / 2 };
    s -= A;
    if (s < H) { const a = s / r; return { x: 266 + Math.sin(a) * r, z: 3 - (1 - Math.cos(a)) * r, th: Math.PI / 2 - a }; }
    s -= H;
    if (s < A) return { x: 266 - s, z: -3, th: -Math.PI / 2 };
    s -= A;
    const a = s / r; return { x: -150 - Math.sin(a) * r, z: -3 + (1 - Math.cos(a)) * r, th: -Math.PI / 2 - a };
  }
  function palmLoopPos(s) {
    const A = 230, r = 2.6, H = Math.PI * r, L = 2 * A + 2 * H;
    s = ((s % L) + L) % L;
    if (s < A) return { x: -115 + s, z: CFG.PALM_Z + 2.5, th: Math.PI / 2 };
    s -= A;
    if (s < H) { const a = s / r; return { x: 115 + Math.sin(a) * r, z: CFG.PALM_Z + 2.5 - (1 - Math.cos(a)) * r, th: Math.PI / 2 - a }; }
    s -= H;
    if (s < A) return { x: 115 - s, z: CFG.PALM_Z - 2.5, th: -Math.PI / 2 };
    s -= A;
    const a = s / r; return { x: -115 - Math.sin(a) * r, z: CFG.PALM_Z - 2.5 + (1 - Math.cos(a)) * r, th: -Math.PI / 2 - a };
  }

  function updateTraffic(dt) {
    for (const t of traffic) {
      // polite 1937 drivers: ease off near the player
      const p = t.path(t.s);
      const ahead = t.path(t.s + 7);
      const px = G.inCar ? G.car.x : G.player.x, pz = G.inCar ? G.car.z : G.player.z;
      const near = dist2(ahead.x, ahead.z, px, pz) < 36 || dist2(p.x, p.z, px, pz) < 25;
      t.s += (near ? t.speed * 0.12 : t.speed) * dt;
      const q = t.path(t.s);
      t.grp.position.set(q.x, 0, q.z);
      t.grp.rotation.y = q.th - Math.PI / 2;
    }
  }

  function build(sc) {
    scene = sc;
    buildPlayerCar();
    parked(-36, 4.6, Math.PI / 2, 0x35414e);
    parked(-58, -4.6, -Math.PI / 2, 0x4a4438);
    parked(72, 4.6, Math.PI / 2, 0x24332a);
    parked(96, -4.6, -Math.PI / 2, 0x3c3030);
    trafficCar(0x2e4a6e, 'sedan', mainLoopPos, 9, 120);   // the blue coupe
    trafficCar(0x5a4a32, 'truck', palmLoopPos, 6.5, 40);
    trafficCar(0x383d33, 'sedan', mainLoopPos, 8.2, 560);
  }

  return { build, updateCar, updateTraffic, makeCar };
})();

// ============ 07 npcs ============
const NPCS = (() => {
  const M = MAT.lib;
  let scene;
  const list = [];

  const GEO = {};
  function geo(key, make) { return GEO[key] || (GEO[key] = make()); }

  // model faces +x
  function makePerson(o) {
    o = Object.assign({ coat: 0x4a4438, pants: 0x2e2c28, skin: 0xc9966e, hat: 'fedora', hatCol: 0x3a352c, skirt: false, scale: 1 }, o);
    const g = new THREE.Group();
    const coatM = new THREE.MeshLambertMaterial({ color: o.coat });
    const pantsM = new THREE.MeshLambertMaterial({ color: o.pants });
    const skinM = new THREE.MeshLambertMaterial({ color: o.skin });
    const hatM = new THREE.MeshLambertMaterial({ color: o.hatCol });
    const mk = (gm, mat, x, y, z) => { const m = new THREE.Mesh(gm, mat); m.position.set(x, y, z); m.castShadow = true; g.add(m); return m; };
    let legL, legR;
    if (o.skirt) {
      mk(geo('skirt', () => { const c = new THREE.CylinderGeometry(0.13, 0.3, 0.62, 8); c.translate(0, -0.31, 0); return c; }), coatM, 0, 1.12, 0);
      legL = mk(geo('legS', () => { const b = new THREE.BoxGeometry(0.11, 0.42, 0.11); b.translate(0, -0.21, 0); return b; }), pantsM, 0, 0.46, 0.08);
      legR = mk(GEO.legS, pantsM, 0, 0.46, -0.08);
    } else {
      legL = mk(geo('leg', () => { const b = new THREE.BoxGeometry(0.15, 0.8, 0.15); b.translate(0, -0.4, 0); return b; }), pantsM, 0, 0.84, 0.11);
      legR = mk(GEO.leg, pantsM, 0, 0.84, -0.11);
    }
    mk(geo('torso', () => new THREE.BoxGeometry(0.27, 0.58, 0.42)), coatM, 0, 1.34, 0);
    const armL = mk(geo('arm', () => { const b = new THREE.BoxGeometry(0.12, 0.58, 0.12); b.translate(0, -0.29, 0); return b; }), coatM, 0, 1.58, 0.28);
    const armR = mk(GEO.arm, coatM, 0, 1.58, -0.28);
    mk(geo('head', () => new THREE.BoxGeometry(0.22, 0.27, 0.21)), skinM, 0, 1.83, 0);
    if (o.hat === 'fedora') {
      mk(geo('brim', () => new THREE.CylinderGeometry(0.23, 0.23, 0.03, 10)), hatM, 0.01, 1.97, 0);
      mk(geo('crown', () => new THREE.CylinderGeometry(0.14, 0.16, 0.17, 8)), hatM, 0, 2.06, 0);
    } else if (o.hat === 'cloche') {
      mk(geo('cloche', () => new THREE.SphereGeometry(0.16, 8, 6, 0, TAU, 0, Math.PI * 0.62)), hatM, 0, 1.93, 0);
    } else if (o.hat === 'cap') {
      mk(geo('capb', () => new THREE.CylinderGeometry(0.17, 0.17, 0.08, 8)), hatM, 0, 1.99, 0);
      mk(geo('capp', () => new THREE.BoxGeometry(0.18, 0.02, 0.2)), hatM, 0.2, 1.97, 0);
    }
    g.scale.setScalar(o.scale);
    return { grp: g, legL, legR, armL, armR };
  }

  // schedule: keyframes [{t,x,z,dwell}] over period P (game minutes)
  function positionAt(kf, P, m) {
    m = ((m % P) + P) % P;
    let i = kf.length - 1;
    for (let k = 0; k < kf.length; k++) { if (kf[k].t <= m) i = k; else break; }
    const a = kf[i], b = kf[(i + 1) % kf.length];
    const depart = a.t + (a.dwell || 0);
    const arrive = (i + 1 < kf.length) ? b.t : P + kf[0].t;
    if (m <= depart || arrive <= depart) {
      return { x: a.x, z: a.z, th: Math.atan2(b.x - a.x, b.z - a.z), moving: false };
    }
    const u = clamp((m - depart) / (arrive - depart), 0, 1);
    return { x: lerp(a.x, b.x, u), z: lerp(a.z, b.z, u), th: Math.atan2(b.x - a.x, b.z - a.z), moving: u < 1 };
  }

  function addNPC(n) { list.push(n); scene.add(n.p.grp); return n; }

  function scheduled(id, person, kf, P, opts) {
    const n = Object.assign({ id, p: person, kf, P, phase: 0, dialogId: null }, opts || {});
    n.update = function (dt) {
      const pos = positionAt(this.kf, this.P, G.gameMin + (this.tOff || 0));
      const g = this.p.grp;
      g.position.set(pos.x, terrainH(pos.x, pos.z), pos.z);
      if (G.state === 'DIALOG' && G.dialogNPC === this.id) {
        g.rotation.y = Math.atan2(G.player.x - pos.x, G.player.z - pos.z) - Math.PI / 2;
      } else {
        g.rotation.y = pos.th - Math.PI / 2;
      }
      this.phase += (pos.moving ? dt * 6.4 : -this.phase * dt * 8);
      const s = Math.sin(this.phase) * (pos.moving ? 0.5 : 0);
      this.p.legL.rotation.z = s; this.p.legR.rotation.z = -s;
      this.p.armL.rotation.z = -s * 0.7; this.p.armR.rotation.z = s * 0.7;
      this.pos = pos;
      if (this.extra) this.extra(dt, pos);
    };
    return addNPC(n);
  }

  // NOTE: person model faces +x; rotation.y here uses atan2(dx,dz) which orients +z-facing models.
  // We compensate by building schedules' th the same way and rotating the group with an inner pivot.
  function build(sc) {
    scene = sc;

    // ---- Mrs. Pell: the clockwork spill ----
    const pellP = makePerson({ coat: 0x5a3a52, hat: 'cloche', hatCol: 0x2e2436, skirt: true });
    pellP.grp.rotation.order = 'YXZ';
    const pellKF = [
      { t: 0, x: -66.6, z: 40, dwell: 8 },
      { t: 12, x: -66.6, z: 8.3 },
      { t: 14, x: -56, z: 8.3, dwell: 6 },     // THE DROP happens here, :14–:18
      { t: 26, x: -34.5, z: 8.3, dwell: 6 },   // chats at the newsstand
      { t: 40, x: -66.6, z: 8.3 },
      { t: 46, x: -66.6, z: 40, dwell: 14 },
    ];
    const oranges = [];
    for (let i = 0; i < 3; i++) {
      const o = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), M.orange);
      o.visible = false; scene.add(o); oranges.push(o);
    }
    const bub = new THREE.Sprite(new THREE.SpriteMaterial({ map: T.bubble('pell', ['Oh! Butterfingers —', 'every time, I swear.']), transparent: true, depthWrite: false }));
    bub.scale.set(3.4, 1.06, 1); bub.visible = false; scene.add(bub);
    const rests = [[-55.1, 7.3], [-56.9, 7.6], [-55.5, 9.2]];
    scheduled('pell', pellP, pellKF, 60, {
      dialogId: 'pell',
      extra(dt, pos) {
        const p = ((G.gameMin % 60) + 60) % 60;
        const drop = p >= 14 && p < 18.4;
        bub.visible = p >= 14.2 && p < 16.4 && G.state !== 'TITLE';
        bub.position.set(pos.x, 2.9, pos.z);
        // crouch while gathering
        const crouch = p >= 15.2 && p < 17.4 ? 0.8 : 1;
        this.p.grp.scale.y += (crouch - this.p.grp.scale.y) * Math.min(1, dt * 6);
        for (let i = 0; i < 3; i++) {
          const o = oranges[i];
          const gone = p > 16.2 + i * 0.5;
          o.visible = drop && p >= 14.05 && !gone;
          if (o.visible) {
            const u = clamp((p - 14.05) / 1.15, 0, 1);
            const rx = rests[i][0], rz = rests[i][1];
            o.position.set(lerp(pos.x, rx, u), Math.max(0.09, 1.05 * (1 - u) + Math.abs(Math.sin(u * 9)) * 0.22 * (1 - u)), lerp(pos.z, rz, u));
          }
        }
        // witnessing
        if (drop && G.state === 'PLAY') {
          const cyc = Math.floor(G.gameMin / 60);
          if (dist2(G.player.x, G.player.z, -56, 8.3) < 22 * 22 && this.lastCyc !== cyc) {
            this.lastCyc = cyc;
            FLAGS.pellWitness++;
            dlog('pell witnessed #' + FLAGS.pellWitness);
            if (FLAGS.pellWitness === 1) UI.toast('A woman drops her oranges at the corner.');
            if (FLAGS.pellWitness >= 2) QUEST.addSeam('CLOCKWORK', 'Clockwork', 'Mrs. Pell drops her oranges at a quarter past. Every hour. Same oranges. Same words. Same spill.');
          }
        }
      }
    });

    // ---- the twins ----
    const twinOpts = { coat: 0x55534e, pants: 0x3a3833, hat: 'fedora', hatCol: 0x2c2a26, skin: 0xbf8f68 };
    const twA = makePerson(twinOpts), twB = makePerson(twinOpts);
    const kfA = [{ t: 0, x: -82, z: -7.6 }, { t: 62, x: 82, z: -7.6, dwell: 3 }, { t: 127, x: -82, z: -7.6, dwell: 3 }];
    const kfB = [{ t: 0, x: 82, z: -7.6 }, { t: 62, x: -82, z: -7.6, dwell: 3 }, { t: 127, x: 82, z: -7.6, dwell: 3 }];
    const nA = scheduled('twinA', twA, kfA, 130, { dialogId: 'twin' });
    const nB = scheduled('twinB', twB, kfB, 130, {
      dialogId: 'twin',
      extra() {
        if (G.state !== 'PLAY' || FLAGS.twinsSeen) return;
        if (!nA.pos || !this.pos) return;

// ============ 09 player & input ============
const PLAYER = (() => {
  const keys = {};
  const pressed = {};
  let mouseDX = 0, mouseDY = 0;
  const virtual = { f: 0, b: 0, l: 0, r: 0, run: 0, lookX: 0, lookY: 0 };
  let canvasEl = null;

  function onKey(e, down) {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (down && !keys[k]) pressed[k] = true;
    keys[k] = down;
    if (down && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
  }

  function init(canvas) {
    canvasEl = canvas;
    if (ENV.headless) return;
    WIN.addEventListener('keydown', e => onKey(e, true));
    WIN.addEventListener('keyup', e => onKey(e, false));
    DOC.addEventListener('mousemove', e => {
      if (DOC.pointerLockElement === canvasEl) { mouseDX += e.movementX || 0; mouseDY += e.movementY || 0; }
    });
    canvas.addEventListener('click', () => {
      if (G.state === 'PLAY' && DOC.pointerLockElement !== canvasEl && !G.isTouch) {
        canvas.requestPointerLock && canvas.requestPointerLock();
      }
    });
  }

  function key(k) { return !!keys[k] || (G.debugKeys && G.debugKeys[k]); }
  function justPressed(k) { const v = pressed[k] || (G.debugPressed && G.debugPressed[k]); if (G.debugPressed) G.debugPressed[k] = false; return !!v; }

  function moveInput() {
    return {
      f: (key('w') || key('ArrowUp') ? 1 : 0) + virtual.f,
      b: (key('s') || key('ArrowDown') ? 1 : 0) + virtual.b,
      l: (key('a') || key('ArrowLeft') ? 1 : 0) + virtual.l,
      r: (key('d') || key('ArrowRight') ? 1 : 0) + virtual.r,
      run: key('Shift') || virtual.run,
    };
  }

  function findInteract() {
    let best = null, bestD = 1e9;
    for (const it of G.interactables) {
      if ((it.inside || null) !== G.inside) continue;
      if (it.hidden && !it.revealed) continue;
      const d2 = dist2(G.player.x, G.player.z, it.x, it.z);
      if (d2 < it.r * it.r && d2 < bestD) { best = it; bestD = d2; }
    }
    // car entry as pseudo-interactable
    if (!G.inside && !G.inCar && G.car) {
      const d2 = dist2(G.player.x, G.player.z, G.car.x, G.car.z);
      if (d2 < 3.4 * 3.4 && d2 < bestD) best = { id: 'car', label: 'Get in the car', onUse: () => enterCar() };
    }
    return best;
  }

  function enterCar() {
    G.inCar = true;
    G.nearInteract = null;
    if (isNight()) G.car.setLights(true);
    AUDIO.engineStart();
    UI.toast('W to drive · S brake/reverse · A/D steer · E to step out · R radio');
    dlog('entered car');
  }
  function exitCar() {
    G.inCar = false;
    const lx = Math.cos(G.car.th), lz = -Math.sin(G.car.th);
    let px = G.car.x + lx * 2.0, pz = G.car.z + lz * 2.0;
    [px, pz] = collideCircle(G.colliders, px, pz, CFG.BODY_R);
    G.player.x = px; G.player.z = pz;
    G.player.yaw = G.car.th;
    AUDIO.setEngine(0, 0);
    dlog('exited car');
  }

  function isNight() {
    const m = G.dayMin;
    return m >= 19 * 60 + 52 || m < 5 * 60 + 40;
  }

  function update(dt, cam) {
    // consume mouse look
    if (G.state === 'PLAY' && !G.inCar) {
      const sx = mouseDX + virtual.lookX, sy = mouseDY + virtual.lookY;
      G.player.yaw -= sx * 0.0023;
      G.player.pitch = clamp(G.player.pitch - sy * 0.0023, -1.45, 1.45);
    }
    mouseDX = 0; mouseDY = 0; virtual.lookX = 0; virtual.lookY = 0;

    if (G.state === 'PLAY') {
      const inp = moveInput();
      if (G.inCar) {
        VEH.updateCar(dt, { f: inp.f > 0, b: inp.b > 0, l: inp.l > 0, r: inp.r > 0 });
        G.player.x = G.car.x; G.player.z = G.car.z;   // world systems track the driver
        if (justPressed('e')) exitCar();
        if (justPressed('f')) G.car.setLights(!G.car.lights);
        if (justPressed('r')) AUDIO.radioCycle();
      } else {
        const fx = Math.sin(G.player.yaw), fz = Math.cos(G.player.yaw);
        const rx = -Math.cos(G.player.yaw), rz = Math.sin(G.player.yaw);
        let mx = fx * (inp.f - inp.b) + rx * (inp.r - inp.l);
        let mz = fz * (inp.f - inp.b) + rz * (inp.r - inp.l);
        const len = Math.hypot(mx, mz);
        if (len > 0.001) {
          const sp = (inp.run ? CFG.RUN : CFG.WALK) * dt / len;
          let px = G.player.x + mx * sp, pz = G.player.z + mz * sp;
          const set = G.inside ? G.barColliders : G.colliders;
          [px, pz] = collideCircle(set, px, pz, CFG.BODY_R);
          G.player.x = px; G.player.z = pz;
          G.bobT = (G.bobT || 0) + dt * (inp.run ? 11 : 7.5);
          AUDIO.step(dt, inp.run);
        }
        const it = findInteract();
        G.nearInteract = it;
        if (justPressed('e') && it) it.onUse();
      }
      if (justPressed('j')) UI.openJournal();
    }
    if (justPressed('m')) { G.muted = !G.muted; AUDIO.setMuted(G.muted); UI.toast(G.muted ? 'Sound off' : 'Sound on'); }
    if (justPressed('Escape')) UI.escape();

    updateCamera(dt, cam);
    // clear edge-pressed
    for (const k in pressed) pressed[k] = false;
  }

  const camTmp = new THREE.Vector3();
  function updateCamera(dt, cam) {
    if (!cam) return;
    if (G.inCar) {
      const c = G.car;
      const fx = Math.sin(c.th), fz = Math.cos(c.th);
      const ty = terrainH(c.x, c.z);
      camTmp.set(c.x - fx * 7.6, ty + 3.2, c.z - fz * 7.6);
      const k = 1 - Math.exp(-dt * 5.5);
      if (G.camSnap) { cam.position.copy(camTmp); G.camSnap = false; }
      else cam.position.lerp(camTmp, k);
      // keep chase cam above terrain
      const minY = terrainH(cam.position.x, cam.position.z) + 1.2;
      if (cam.position.y < minY) cam.position.y = minY;
      cam.lookAt(c.x + fx * 4.5, ty + 1.25, c.z + fz * 4.5);
    } else {
      const p = G.player;
      const baseY = G.inside ? 0 : terrainH(p.x, p.z);
      const bob = Math.sin(G.bobT || 0) * 0.035;
      cam.position.set(p.x, baseY + CFG.EYE + bob, p.z);
      cam.rotation.order = 'YXZ';
      cam.rotation.y = p.yaw + Math.PI;
      cam.rotation.x = p.pitch;
      cam.rotation.z = 0;
    }
  }

  return { init, update, enterCar, exitCar, isNight, virtual, justPressed, key };
})();

  let tree = null, node = null;
  function start(id) {
    tree = TREES[id];

    G.state = 'DIALOG';
    goto(tree.entry());
    dlog('dialog ' + id);
  }
  function goto(id) {
    if (!id) return end();
    node = tree.nodes[id];
    if (!node) return end();
    G.dialogNode = node; G.dialogNodeId = id;
    if (node.onEnter) node.onEnter();
    const txt = typeof node.text === 'function' ? node.text() : node.text;
    G.dialogText = txt;
    UI.showDialog(node.sp, txt, node.ch ? node.ch.map(c => c.t) : null, !node.ch);
  }
  function choose(i) {
    if (G.state !== 'DIALOG' || !node || !node.ch) return;
    const c = node.ch[i];
    if (!c) return;
    if (c.a) c.a();
    if (c.n) goto(c.n); else endWith(node);
  }
  function advance() {
    if (G.state !== 'DIALOG' || !node || node.ch) return;
    if (node.n) goto(node.n); else endWith(node);
  }
  function endWith(n) { const after = n && n.after; end(); if (after) after(); }
  function end() {
    G.state = 'PLAY';
    G.dialogNode = null; G.dialogNPC = null;
    UI.hideDialog();
  }

  return { start, choose, advance, end, TREES };
})();

// ============ 11 quest — seams, objectives, doors, notes ============
const QUEST = (() => {
  const OBJ = [
    'Evening. Find a drink — The Blue Pacific is open on Main.',
    'Talk to the bartender.',
    'Something is off about this town. Catch it twice more.',
    'Ask Gus about the things you have seen.',
    'Find the Whitmore packing shack on the east grove road.',
    'Drive east. Past every sign. Don\u2019t stop.',
    'Ask Gus how green it was.',
    'Friday, June 11th, 1937. It will be Friday again tomorrow.',
  ];

  const NOTE_TEXT = [
    'If you found this, you noticed. Most don\u2019t.',
    '',
    'Watch Mrs. Pell at a quarter past. Any hour. Every hour.',
    'Charlie\u2019s paper is always fresh. It is always Friday.',
    'The record at the Pacific stumbles on bar seven. Count.',
    '',
    'I measured the rest of it. It isn\u2019t miles \u2014 it\u2019s a number:',
    'nine sixty-five.',
    '',
    'The groves get thin where the world runs out of ideas.',
    'Drive east. Past every sign. Don\u2019t stop.',
    '',
    '\u2014 J.W., June 11',
  ].join('\n');

  function hasSeam(id) { return G.seams.some(s => s.id === id); }

  function addSeam(id, title, text) {
    if (hasSeam(id)) return false;
    G.seams.push({ id, title, text, at: fmtClock(G.dayMin) });
    G.journal.push({ kind: 'seam', title, text, at: fmtClock(G.dayMin) });
    UI.toast('NOTICED \u2014 ' + title, 'seam');
    if (AUDIO.sting) AUDIO.sting();
    dlog('seam:' + id);
    checkObjectives();
    return true;
  }

  function note(title, text) {
    G.journal.push({ kind: 'note', title, text, at: fmtClock(G.dayMin) });
  }

  function checkObjectives() {
    let o = 0;
    if (FLAGS.enteredBarOnce) o = 1;
    if (FLAGS.metGus) o = 2;
    if (FLAGS.metGus && G.seams.length >= 3) o = 3;
    if (FLAGS.gusStage >= 2) o = 4;
    if (FLAGS.noteRead) o = 5;
    if (FLAGS.boundaryReached) o = 6;
    if (FLAGS.epilogueDone) o = 7;
    if (o !== G.objective) {
      G.objective = o;
      UI.toast(OBJ[o], 'obj');
      dlog('objective:' + o);
    }
  }

  // ---- seam helpers wired from dialogue/world --------------------------------
  function seamUsual() {
    addSeam('THE_USUAL', 'The Usual',
      'You never told Gus your drink. The rye was poured before your hat was off. He knew. He always knows.');
  }
  function seamPaper() {
    addSeam('EVERGREEN', 'Evergreen',
      'Charlie swears the Examiner is fresh every morning. It is the same paper. Friday, June 11th, 1937. Every column. Every smudge.');
  }

  // ---- newsstand -------------------------------------------------------------
  function readPaper() {
    UI.showPaper();
    if (!FLAGS.paperRead) {
      FLAGS.paperRead = true;
      note('The Examiner', 'Friday, June 11th, 1937. Grove futures up. A heat spell that never arrives.');
      dlog('paper:first');
    } else {
      seamPaper();
    }
  }

  // ---- bar door --------------------------------------------------------------
  function enterBar() {
    if (G.inside === 'bar') return;
    UI.fade(() => {
      G.inside = 'bar';
      const P = G.player; P.x = INTERIOR.CX; P.z = INTERIOR.CZ + 3.6; P.yaw = Math.PI; P.pitch = 0;
      if (!FLAGS.enteredBarOnce) { FLAGS.enteredBarOnce = true; checkObjectives(); }
      dlog('enterBar');
    });
  }
  function exitBar() {
    if (G.inside !== 'bar') return;
    UI.fade(() => {
      G.inside = null;
      const P = G.player; P.x = -16; P.z = 8.2; P.yaw = Math.PI; P.pitch = 0;
      dlog('exitBar');
    });
  }

  // ---- shack -----------------------------------------------------------------
  function openShack() {
    if (!FLAGS.visitedShack) {
      FLAGS.visitedShack = true;
      note('The packing shack', 'WHITMORE CITRUS CO. The door was never locked. Dust holds the shape of a man\u2019s mornings.');
      const it = G.interactables.find(i => i.id === 'floorboard');
      if (it) it.revealed = true;
      if (G.shackDoor && !G.shackDoor.userData.opening) {
        G.shackDoor.userData.opening = true;
        let t = 0; const d0 = G.shackDoor.rotation.y, d1 = d0 - 1.25;
        G.anim.push({ update(dt) { t = Math.min(1, t + dt * 1.3); G.shackDoor.rotation.y = lerp(d0, d1, ss(0, 1, t)); } });
      }
      UI.toast('The door gives. Dust, and a cot nobody folded.');
      if (AUDIO.creak) AUDIO.creak();
      dlog('shack:open');
    } else {
      UI.toast('Inside: a ledger, a cold stove, one loose board by the cot.');
    }
  }

  function pryBoard() {
    UI.showNote(NOTE_TEXT);
    if (!FLAGS.noteRead) {
      FLAGS.noteRead = true;
      note('Found under the floor', 'A note in pencil, signed J.W. \u201cIt isn\u2019t miles \u2014 it\u2019s a number: nine sixty-five.\u201d');
      checkObjectives();
      dlog('note:read');
    }
  }

  // ---- barricades ------------------------------------------------------------
  function onBarricade(n) {
    if (n === 1) note('Road closed', 'The sawhorse went over easy. Nothing behind it but more road. Why close a road to nowhere?');
    if (n === 3) note('Turn back', 'Hand-painted, the paint still tacky after who knows how long. Somebody wanted this to look desperate.');
    dlog('barricade:' + n);
  }

  // ---- per-frame -------------------------------------------------------------
  function update(dt) {
    // phonograph seam: time spent inside the bar with the record turning
    if (G.inside === 'bar' && (G.state === 'PLAY' || G.state === 'DIALOG')) {
      FLAGS.barMusicTime += dt;
      if (FLAGS.barMusicTime >= 64 && !hasSeam('SKIP')) {
        addSeam('SKIP', 'The Skip',
          'Bar seven, the record stumbles \u2014 the same stumble, every time around. Nobody else hears it. Or they\u2019ve stopped hearing it.');
      }
    }
    // world boundary
    if (G.state === 'PLAY' && !FLAGS.boundaryReached && !G.inside) {
      const P = G.player;
      const d = Math.sqrt(P.x * P.x + P.z * P.z);
      if (d >= CFG.D_BOUNDARY) EDGE.startEnding();
    }
  }

  return { OBJ, addSeam, hasSeam, note, checkObjectives, seamUsual, seamPaper, readPaper, enterBar, exitBar, openShack, pryBoard, onBarricade, update };
})();

  };
  const tmp = { a: new THREE.Color(), b: new THREE.Color(), c: new THREE.Color() };
  const FOGC = new THREE.Color(), SUNC = new THREE.Color();

  function init(scene, camera, amb, dir) {

  // night factor 0..1 from minutes-of-day
  function nightF(m) {

    const morn = 1 - ss(308, 382, m);       // 5:08 -> 6:22
    return Math.max(eve, m < 720 ? morn : 0);
  }
  // dusk warmth (golden hour), peaks ~19:30 and ~6:00
  function duskF(m) {
    m = ((m % 1440) + 1440) % 1440;
    const e = ss(1085, 1165, m) * (1 - ss(1185, 1240, m));
    const d = ss(300, 345, m) * (1 - ss(370, 420, m));
    return Math.max(e, d);
  }

  function mixPal(out, key, a, b, t) { out.copy(a[key]).lerp(b[key], t); return out; }

  function update(dt, t) {
    time = t;
    const P = G.player;
    const px = G.inside ? -16 : P.x, pz = G.inside ? 8 : P.z; // interior counts as town
    const d = Math.sqrt(px * px + pz * pz);
    G.edge = edgeFactorAt(px, pz);
    const m = G.dayMin;
    const night = nightF(m), dusk = duskF(m);
    const skyEdge = ss(770, 985, d);

    // ---- blend palettes: day->dusk by dusk, then ->night by night
    const L = MAT.lib;
    const blended = (out, key) => out.copy(PAL.day[key]).lerp(PAL.dusk[key], dusk).lerp(PAL.night[key], night);
    if (L.skyU) {
      blended(L.skyU.uTop.value, 'top');
      blended(L.skyU.uMid.value, 'mid');
      blended(L.skyU.uHor.value, 'hor');
      blended(L.skyU.uSunGlow.value, 'glow');
      L.skyU.uGlowAmt.value = lerp(lerp(PAL.day.glowAmt, PAL.dusk.glowAmt, dusk), PAL.night.glowAmt, night);
      L.skyU.uEdge.value = skyEdge;

      refs.dir.intensity = dirI * (1 - 0.55 * G.edge) * (G.inside ? 0.25 : 1);
      const sp = L.skyU ? L.skyU.uSunPos.value : { x: 0.4, y: 0.8, z: 0.3 };
      const sy = night > 0.6 ? 0.78 : Math.max(sp.y, 0.10);

    if (refs.amb) {

    // ---- fog (Lambert scene fog + shader fog uniforms stay in sync)
    const fogC = blended(FOGC, 'fog'); fogC.lerp(tmp.c.setHex(0x020503), G.edge * 0.75);
    const fogFar = lerp(lerp(PAL.day.fogFar, PAL.dusk.fogFar, dusk), PAL.night.fogFar, night);
    if (refs.scene && refs.scene.fog) { refs.scene.fog.color.copy(fogC); refs.scene.fog.near = 55; refs.scene.fog.far = fogFar; }
    const sunColScaled = SUNC.copy(dirC).multiplyScalar(dirI * 1.7);
    for (const u of [L.groundU, L.eastRoadU]) {

      u.uFogColor.value.copy(fogC); u.uFogNear.value = 55; u.uFogFar.value = fogFar;

      if (u.uSunDir) u.uSunDir.value.y = Math.max(u.uSunDir.value.y, 0.22);

    if (L.wallU) { L.wallU.uTime.value = t; L.wallU.uPlayerD.value = d; }

    // ---- night switches (textures, lamps, neon, windows)
    const nightOn = night > 0.5;
    if (nightOn !== lastNightOn) {
      lastNightOn = nightOn;
      for (const s of (G.nightSwapList || [])) {
        if (s.colorOnly) s.mat.color.setHex(nightOn ? s.nightColor : s.dayColor);
        else { s.mat.map = nightOn ? s.night : s.day; s.mat.needsUpdate = true; }
      }
      for (const lh of (G.lampHeads || [])) {
        if (lh.headMat.emissive) lh.headMat.emissive.setHex(nightOn ? 0xffd9a0 : 0x000000);
        lh.headMat.color.setHex(nightOn ? 0xffe9c0 : 0x39414c);
      }
      dlog('night:' + nightOn);
    }
    for (const lh of (G.lampHeads || [])) lh.pool.opacity = lerp(lh.pool.opacity, nightOn ? 0.8 : 0, dt * 2);
    for (const nm of (G.neonMats || [])) {
      const f = nm.seed != null ? flick(t, nm.seed) : 1;
      nm.mat.opacity = lerp(nm.mat.opacity, night * (nm.base || 1) * f, dt * 6);
    }
    for (const nl of (G.nightLights || [])) {
      const f = nl.flicker ? flick(t, nl.max * 13.7) : 1;
      nl.light.intensity = night * nl.max * f;

    if (G.moonMat) G.moonMat.opacity = night * (1 - skyEdge) * 0.95;

    // ---- film grain / vignette driven by edge
    UI.setGrade(G.edge, night);

    // ---- ending state machines
    if (G.state === 'ENDING') stepEnding(dt);
  }

  // =========================== THE BOUNDARY ===========================
  const E = { t: 0, lineIdx: -1, car: false, v0: 0, camFrom: null, done: false };
  const LINES = [
    'The road doesn\u2019t end. It just stops being a road.',
    'No crash. No cliff. The engine isn\u2019t killed \u2014 it\u2019s dismissed.',
    'The groves give up their oranges, then their leaves, then the pretense.',
    'Lines. Green lines on nothing, holding the shape of a valley out of habit.',
    'Gus is back there polishing the same glass. Mrs. Pell is gathering the same oranges.',
    'Somewhere a needle skips. Bar seven. Forever.',
    'Nine hundred sixty-five. Whitmore counted it too.',
  ];
  const LINE_T0 = 2.6, LINE_DUR = 4.4;

  function startEnding() {
    if (FLAGS.boundaryReached) return;
    FLAGS.boundaryReached = true;
    G.state = 'ENDING';
    E.t = 0; E.lineIdx = -1; E.done = false;
    E.car = G.inCar; E.v0 = G.car ? G.car.v : 0;
    G.endingSlow = 1;
    E.camFrom = { pos: refs.camera.position.clone(), quat: refs.camera.quaternion.clone() };
